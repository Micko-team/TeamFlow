function setKanbanCol(colId){UI.kanbanCol=colId;renderApp()}

function calPrevMonth(){UI.calMonth--;if(UI.calMonth<0){UI.calMonth=11;UI.calYear--}saveLocal();renderApp()}
function calNextMonth(){UI.calMonth++;if(UI.calMonth>11){UI.calMonth=0;UI.calYear++}saveLocal();renderApp()}
function calToday(){const n=new Date();UI.calMonth=n.getMonth();UI.calYear=n.getFullYear();saveLocal();renderApp()}
function dstr(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}

function renderCalendar(){
  const team=getTeam();if(!team)return`<div class="empty"><i class="ti ti-calendar"></i>Select a team</div>`;
  const y=UI.calYear,m=UI.calMonth;
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const firstDow=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=new Date().toISOString().split('T')[0];
  const tasksByDay={};
  (team.tasks||[]).forEach(t=>{if(t.deadline){(tasksByDay[t.deadline]=tasksByDay[t.deadline]||[]).push(t)}});
  let cells='';
  for(let i=0;i<firstDow;i++)cells+=`<div class="cal-cell empty-cell"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=dstr(y,m,d);
    const dayTasks=tasksByDay[ds]||[];
    const isToday=ds===todayStr;
    cells+=`<div class="cal-cell${isToday?' today':''}${dayTasks.length?' has-tasks':''}" onclick="${dayTasks.length?`openModal('dayTasks','${ds}')`:''}">
      <div class="cal-daynum">${d}</div>
      ${dayTasks.slice(0,3).map(t=>`<div class="cal-task-chip" style="background:${pColor(t.priority)}20;color:${pColor(t.priority)}" title="${t.title}">${t.title}</div>`).join('')}
      ${dayTasks.length>3?`<div class="cal-more">+${dayTasks.length-3} more</div>`:''}
    </div>`;
  }
  return `<div class="page-hdr">
      <div class="page-title">Calendar</div>
      <button class="btn btn-g btn-sm" onclick="calToday()">Today</button>
      ${canCreateTask(team)?`<button class="btn btn-p btn-sm" onclick="openModal('addTask')"><i class="ti ti-plus"></i> New ${taskWord(team)}</button>`:''}
    </div>
    <div class="cal-hdr">
      <button class="cal-nav-btn" onclick="calPrevMonth()"><i class="ti ti-chevron-left"></i></button>
      <div class="cal-title">${monthNames[m]} ${y}</div>
      <button class="cal-nav-btn" onclick="calNextMonth()"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="cal-grid">
      ${dow.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>`;
}

  const pendingInvites=DB.invites.filter(i=>i.teamId===team.id&&i.status==='pending');
  const isOwner=team.ownerId===SESSION.userId;
  const myRole=getMyRole(team);
  const canManage=myRole==='owner'||myRole==='admin';
  const joinReqs=canManage?(DB.joinRequests||[]).filter(r=>r.teamId===team.id&&r.status==='pending'):[];
  return `<div class="page-hdr"><div class="page-title">Members</div>
    <div style="display:flex;gap:8px">
      ${canManage?`<button class="btn btn-g btn-sm" onclick="openModal('publicSettings')"><i class="ti ti-world"></i> ${team.public?'Public':'Make public'}</button>`:''}
      ${canInvite(team)?`<button class="btn btn-p btn-sm" onclick="openModal('inviteMember')"><i class="ti ti-user-plus"></i> Invite</button>`:''}
    </div>

    ${joinReqs.map(r=>{const u=DB.users[r.userId];return u?`<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--border)">

    ${pendingInvites.map(inv=>{const u=DB.users[inv.toUserId];return u?`<div style="display:flex;align-items:center;gap:7px;padding:4px 0"><div class="av av-xs" style="background:${ac(u.display)}22;color:${ac(u.display)}">${ini(u.display)}</div><span style="font-size:12px">@${u.username}</span><span style="font-size:11px;color:var(--text2)">• ${inv.role||'member'} • invited ${fmt(inv.ts)}</span></div>`:'';}).join('')}

      const m=DB.users[mid];if(!m)return'';

        </div>
      </div>`;}).join('')}
  </div>`;
}

function healthColor(h){
  if(h>=80)return'var(--grn)';
  if(h>=60)return'var(--blu)';
  if(h>=40)return'var(--amb)';
  return'var(--red)';
}
function trendIcon(t){
  if(t==='improving')return'<span style="color:var(--grn)">📈</span>';
  if(t==='declining')return'<span style="color:var(--red)">📉</span>';
  return'<span style="color:var(--text3)">➡️</span>';
}

function setPerfChartRange(r){UI.perfChartRange=r;saveLocal();renderApp()}

function buildTeamTrendData(team,range){
  const n=range==='month'?30:7;
  const now=new Date();now.setHours(0,0,0,0);
  const data=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const dayStart=d.getTime();
    const dayEnd=dayStart+86400000;
    const completed=(team.tasks||[]).filter(t=>t.completedAt&&t.completedAt>=dayStart&&t.completedAt<dayEnd).length;
    const activity=(team.activity||[]).filter(a=>a.ts>=dayStart&&a.ts<dayEnd).length;
    data.push({date:d,completed,activity});
  }
  return data;
}

function renderTeamTrendChart(team){
  const range=UI.perfChartRange==='month'?'month':'week';
  const data=buildTeamTrendData(team,range);
  const w=700,h=230,padL=8,padR=8,padT=16,padB=26;
  const innerW=w-padL-padR,innerH=h-padT-padB;
  const n=data.length;
  const maxCompleted=Math.max(...data.map(d=>d.completed),1);
  const maxActivity=Math.max(...data.map(d=>d.activity),1);
  const xFor=i=>n>1?padL+(i*(innerW/(n-1))):padL+innerW/2;
  const yForCompleted=v=>padT+innerH-(v/maxCompleted)*innerH;
  const yForActivity=v=>padT+innerH-(v/maxActivity)*innerH;
  const linePathCompleted=data.map((d,i)=>`${i===0?'M':'L'}${xFor(i).toFixed(1)},${yForCompleted(d.completed).toFixed(1)}`).join(' ');
  const areaPathCompleted=linePathCompleted+` L${xFor(n-1).toFixed(1)},${(padT+innerH).toFixed(1)} L${xFor(0).toFixed(1)},${(padT+innerH).toFixed(1)} Z`;
  const linePathActivity=data.map((d,i)=>`${i===0?'M':'L'}${xFor(i).toFixed(1)},${yForActivity(d.activity).toFixed(1)}`).join(' ');
  const gridLines=[0,0.25,0.5,0.75,1].map(f=>{
    const y=(padT+innerH*(1-f)).toFixed(1);
    return `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="${f===0?'0':'3,4'}"/>`;
  }).join('');
  const labelEvery=range==='week'?1:5;
  const xLabels=data.map((d,i)=>{
    if(i%labelEvery!==0&&i!==n-1)return'';
    const lbl=range==='week'?d.date.toLocaleDateString('en',{weekday:'short'}):d.date.toLocaleDateString('en',{month:'short',day:'numeric'});
    return `<text x="${xFor(i).toFixed(1)}" y="${h-8}" text-anchor="middle" font-size="9" fill="var(--text3)">${lbl}</text>`;
  }).join('');
  const totalCompleted=data.reduce((a,d)=>a+d.completed,0);
  const totalActivity=data.reduce((a,d)=>a+d.activity,0);
  const dots=data.map((d,i)=>`<circle class="trend-dot" cx="${xFor(i).toFixed(1)}" cy="${yForCompleted(d.completed).toFixed(1)}" r="3" fill="var(--acc)" stroke="var(--bg2)" stroke-width="1.5"><title>${d.date.toLocaleDateString('en',{month:'short',day:'numeric'})} — ${d.completed} task${d.completed!==1?'s':''} completed, ${d.activity} activity event${d.activity!==1?'s':''}</title></circle>`).join('');
  return `
  <div class="cc-card" style="margin-bottom:14px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:10px">
      <div>
        <div class="cc-title" style="margin-bottom:4px"><i class="ti ti-trending-up" style="margin-right:4px"></i>Team activity trend</div>
        <div style="display:flex;gap:16px;font-size:11px;color:var(--text2);flex-wrap:wrap">
          <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--acc);margin-right:4px"></span>Tasks completed: <b style="color:var(--text)">${totalCompleted}</b></span>
          <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--blu);margin-right:4px"></span>Activity events: <b style="color:var(--text)">${totalActivity}</b></span>
        </div>
      </div>
      <div style="display:flex;gap:2px;background:var(--bg3);border-radius:20px;padding:3px;flex-shrink:0">
        <button class="chart-range-btn${range==='week'?' on':''}" onclick="setPerfChartRange('week')">Week</button>
        <button class="chart-range-btn${range==='month'?' on':''}" onclick="setPerfChartRange('month')">Month</button>
      </div>
    </div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:210px;display:block">
      <defs>
        <linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--acc)" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="var(--acc)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      <path d="${areaPathCompleted}" fill="url(#trendGrad)"/>
      <path d="${linePathActivity}" fill="none" stroke="var(--blu)" stroke-width="1.75" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="4,3" opacity="0.85"/>
      <path d="${linePathCompleted}" fill="none" stroke="var(--acc)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${xLabels}
    </svg>
  </div>`;
}

let _chatPollTimer=null;

function fmtChatTime(ts){
  const d=new Date(ts);
  return d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
}
function chatDayLabel(ts){
  const d=new Date(ts),today=new Date();
  const isSameDay=d.toDateString()===today.toDateString();
  const yest=new Date(today);yest.setDate(yest.getDate()-1);
  if(isSameDay)return'Today';
  if(d.toDateString()===yest.toDateString())return'Yesterday';
  return d.toLocaleDateString('en',{month:'short',day:'numeric'});
}

function chatMsgHTML(m,team,allMsgs){
  const isOwn=m.authorId===SESSION.userId;
  let replyHtml='';
  if(m.replyTo){
    const replyMsg=allMsgs.find(x=>x.id===m.replyTo);
    if(replyMsg){
      const replyAuthor=replyMsg.authorId===SESSION.userId?'You':replyMsg.author;
      replyHtml=`<div class="reply-ref"><div class="reply-ref-author">${replyAuthor}</div>${replyMsg.text.slice(0,60)}${replyMsg.text.length>60?'…':''}</div>`;
    }
  }
  const canDel=canDeleteMessage(m,team);
  return `<div class="chat-row${isOwn?' own':''}">
    ${!isOwn?`<div class="av av-sm" style="background:${ac(m.author)}22;color:${ac(m.author)};flex-shrink:0">${ini(m.author)}</div>`:''}
    <div>
      <div class="chat-meta"><span class="chat-name">${isOwn?'You':m.author}</span><span class="chat-time">${fmtChatTime(m.ts)}</span></div>
      <div class="chat-bubble" oncontextmenu="event.preventDefault();showReplyMenu(event,'${m.id}')">${replyHtml}${highlightMentions(m.text,team)}<div class="msg-actions"><button class="msg-act-btn" onclick="event.stopPropagation();startReply('${m.id}')" title="Reply"><i class="ti ti-corner-down-left"></i></button>${canDel?`<button class="msg-act-btn danger" onclick="event.stopPropagation();deleteChatMessage('${m.id}')" title="Delete"><i class="ti ti-trash"></i></button>`:''}</div></div>
    </div>
  </div>`;
}

function buildChatMessagesHTML(team){
  const msgs=(DB.chats[team.id]||{messages:[]}).messages||[];
  let lastDay=null;
  return msgs.map(m=>{
    const dayLbl=chatDayLabel(m.ts);
    let daySep='';
    if(dayLbl!==lastDay){daySep=`<div class="chat-day-sep">${dayLbl}</div>`;lastDay=dayLbl;}
    return daySep+chatMsgHTML(m,team,msgs);
  }).join('');
}

function scrollChatToBottom(smooth){

  if(jump)jump.classList.remove('show');
}

// نمایش/مخفی دکمه‌ی jump بسته به موقعیت اسکرول
function onChatScroll(){
  const el=document.getElementById('CHAT_MSGS');
  const jump=document.getElementById('CHAT_JUMP');
  if(!el||!jump)return;
  const nearBottom=el.scrollHeight-el.scrollTop-el.clientHeight<120;
  jump.classList.toggle('show',!nearBottom);
}

let _replyToId=null;
let _ctxMenuEl=null;

// قوانین حذف پیام: مالک همه رو / ادمین پیام خودش + اعضای عادی (نه مالک/ادمین دیگه) / بقیه فقط خودشون
function canDeleteMessage(msg,team){
  if(!msg||!team)return false;
  const myRole=getMyRole(team);
  const authorRole=msg.authorId===team.ownerId?'owner':(team.roles?.[msg.authorId]||'member');
  if(myRole==='owner')return true;                    // مالک: همه رو
  if(msg.authorId===SESSION.userId)return true;        // هرکس: پیام خودش
  if(myRole==='admin'&&authorRole!=='owner'&&authorRole!=='admin')return true; // ادمین: اعضای عادی، نه مالک/ادمین
  return false;
}

function showReplyMenu(event,msgId){
  if(_ctxMenuEl){_ctxMenuEl.remove();_ctxMenuEl=null}
  const team=getTeam();
  const chat=DB.chats[team?.id]||{messages:[]};
  const msg=chat.messages.find(m=>m.id===msgId);
  const menu=document.createElement('div');
  menu.className='chat-ctx-menu';
  menu.style.left=Math.min(event.clientX,innerWidth-160)+'px';
  menu.style.top=event.clientY+'px';
  let items=`<div class="chat-ctx-item" onclick="startReply('${msgId}');hideCtxMenu()"><i class="ti ti-corner-down-left"></i> Reply</div>`;
  if(canDeleteMessage(msg,team)){
    items+=`<div class="chat-ctx-item danger" onclick="deleteChatMessage('${msgId}');hideCtxMenu()"><i class="ti ti-trash"></i> Delete</div>`;
  }
  menu.innerHTML=items;
  document.body.appendChild(menu);
  _ctxMenuEl=menu;
  setTimeout(()=>{document.addEventListener('click',hideCtxMenu,{once:true})},10);
}
function hideCtxMenu(){if(_ctxMenuEl){_ctxMenuEl.remove();_ctxMenuEl=null}}

async function deleteChatMessage(msgId){
  const team=getTeam();if(!team)return;
  const chat=DB.chats[team.id];if(!chat)return;
  const msg=chat.messages.find(m=>m.id===msgId);
  if(!msg||!canDeleteMessage(msg,team))return;
  chat.messages=chat.messages.filter(m=>m.id!==msgId);
  // رندر مجدد لیست بدون پریدن اسکرول
  const el=document.getElementById('CHAT_MSGS');
  const keepScroll=el?el.scrollTop:0;
  rerenderChatMessages();
  if(el)el.scrollTop=keepScroll;
  await svChat(team.id);
}

function startReply(msgId){
  const team=getTeam();if(!team)return;
  const chat=DB.chats[team.id]||{messages:[]};
  const msg=chat.messages.find(m=>m.id===msgId);if(!msg)return;
  _replyToId=msgId;
  const preview=document.getElementById('CHAT_REPLY_PREVIEW');
  const nameEl=document.getElementById('CHAT_REPLY_NAME');
  if(preview&&nameEl){
    preview.style.display='flex';
    nameEl.textContent=msg.authorId===SESSION.userId?'You':msg.author;
  }
  const input=document.getElementById('CHAT_TEXT');
  if(input)input.focus();
}
function cancelReply(){
  _replyToId=null;
  const preview=document.getElementById('CHAT_REPLY_PREVIEW');
  if(preview)preview.style.display='none';
}

async function sendChatMessage(){
  const input=document.getElementById('CHAT_TEXT');
  if(!input)return;
  const text=input.value.trim();if(!text)return;
  const team=getTeam();if(!team)return;
  const author=me().display;

  if(!DB.chats[team.id])DB.chats[team.id]={messages:[]};
  const msg={id:uid(),authorId:SESSION.userId,author,text,ts:Date.now(),replyTo:_replyToId};
  DB.chats[team.id].messages.push(msg);
  if(DB.chats[team.id].messages.length>300) DB.chats[team.id].messages=DB.chats[team.id].messages.slice(-300);

  input.value='';
  cancelReply();
  const dd=document.getElementById('CHAT_MENTION_DD');if(dd)dd.style.display='none';

  // فقط لیست پیام‌ها رو دوباره رندر کن، نه کل صفحه — تا اسکرول و فوکوس حفظ بشه
  const msgsEl=document.getElementById('CHAT_MSGS');
  if(msgsEl){
    msgsEl.innerHTML=buildChatMessagesHTML(team);
    scrollChatToBottom();
  }

  // منشن‌ها رو نوتیف کن
  const mentioned=extractMentions(text,team);
  mentioned.forEach(u=>{
    if(u.id===SESSION.userId)return;
    addNotif(u.id,`<strong>${author}</strong> mentioned you in team chat`);
    if(u.telegramId){

    await Promise.all(mentioned.filter(u=>u.id!==SESSION.userId).map(u=>svUser(u.id)));

function onChatInput(){
  const input=document.getElementById('CHAT_TEXT');
  const dd=document.getElementById('CHAT_MENTION_DD');
  if(!input||!dd)return;
  const team=getTeam();if(!team)return;
  const query=getMentionQuery(input);
  if(query===null){dd.style.display='none';return;}
  const matches=(team.members||[]).map(mid=>DB.users[mid]).filter(u=>u&&u.id!==SESSION.userId&&u.username.toLowerCase().startsWith(query.toLowerCase()));
  if(matches.length===0){dd.style.display='none';return;}
  _mentionActiveIdx=0;
  dd.style.display='block';
  dd.innerHTML=matches.map((u,i)=>`
    <div class="mention-item${i===0?' hi':''}" data-idx="${i}" data-username="${u.username}" onclick="selectChatMention('${u.username}')">
      <div class="av av-xs" style="background:${ac(u.display)}22;color:${ac(u.display)}">${ini(u.display)}</div>
      <span>${u.display}</span><span style="color:var(--text3)">@${u.username}</span>
    </div>`).join('');

function onChatKeydown(event){
  const dd=document.getElementById('CHAT_MENTION_DD');
  const isOpen=dd&&dd.style.display==='block';
  if(isOpen){
    const items=dd.querySelectorAll('.mention-item');
    if(event.key==='ArrowDown'){event.preventDefault();_mentionActiveIdx=Math.min(_mentionActiveIdx+1,items.length-1);updateMentionHighlight(items);return;}
    if(event.key==='ArrowUp'){event.preventDefault();_mentionActiveIdx=Math.max(_mentionActiveIdx-1,0);updateMentionHighlight(items);return;}
    if(event.key==='Enter'||event.key==='Tab'){
      event.preventDefault();
      const active=items[_mentionActiveIdx];
      if(active)selectChatMention(active.dataset.username);
      return;
    }
    if(event.key==='Escape'){dd.style.display='none';return;}
  }
  if(event.key==='Enter'&&!isOpen){sendChatMessage();}
}

function selectChatMention(username){
  const input=document.getElementById('CHAT_TEXT');
  const dd=document.getElementById('CHAT_MENTION_DD');
  if(!input)return;
  const pos=input.selectionStart;
  const text=input.value;
  const before=text.slice(0,pos).replace(/@([a-zA-Z0-9_]*)$/,'@'+username+' ');
  const after=text.slice(pos);
  input.value=before+after;
  const newPos=before.length;
  input.focus();
  input.setSelectionRange(newPos,newPos);
  if(dd)dd.style.display='none';
}

    const old=DB.chats[UI.activeTeam]||{messages:[]};

function renderAnalytics(){
  const team=getTeam();if(!team)return`<div class="empty"><i class="ti ti-chart-bar"></i>Select a team</div>`;
  const tasks=team.tasks||[];
  const statuses=['todo','inprogress','review','done','blocked'];
  const sCounts=statuses.map(s=>tasks.filter(t=>t.status===s).length);
  const maxS=Math.max(...sCounts,1);
  const sColors=['var(--text2)','var(--blu)','var(--amb)','var(--grn)','var(--red)'];
  const members=(team.members||[]).map(mid=>DB.users[mid]).filter(Boolean);
  const mWork=members.map(m=>({name:m.display,count:tasks.filter(t=>(t.assignees||[]).includes(m.id)).length})).sort((a,b)=>b.count-a.count).slice(0,5);
  const maxM=Math.max(...mWork.map(m=>m.count),1);
  const total=tasks.length,done=tasks.filter(t=>t.status==='done').length;
  const pH=tasks.filter(t=>t.priority==='high').length,pM=tasks.filter(t=>t.priority==='medium').length,pL=tasks.filter(t=>t.priority==='low').length;
  const overdue=tasks.filter(t=>t.status!=='done'&&t.deadline&&days(t.deadline)<0).length;
  return `<div class="page-hdr"><div class="page-title">Analytics</div></div>
  <div class="stats-grid">
    <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val" style="color:var(--acc)">${total}</div></div>
    <div class="stat"><div class="stat-lbl">Done</div><div class="stat-val" style="color:var(--grn)">${total?Math.round(done/total*100):0}%</div></div>
    <div class="stat"><div class="stat-lbl">Members</div><div class="stat-val" style="color:var(--blu)">${members.length}</div></div>
    <div class="stat"><div class="stat-lbl">Overdue</div><div class="stat-val" style="color:${overdue?'var(--red)':'var(--grn)'}">${overdue}</div></div>
  </div>
  <div class="an-grid">
    <div class="cc-card"><div class="cc-title">Tasks by status</div><div class="bar-ch">${statuses.map((s,i)=>`<div class="bw"><div class="bv">${sCounts[i]}</div><div class="bar" style="height:${Math.round(sCounts[i]/maxS*70)+4}px;background:${sColors[i]};opacity:.85"></div><div class="bl">${STATUS_MAP[s]?.split(' ')[0]}</div></div>`).join('')}</div></div>
    <div class="cc-card"><div class="cc-title">Priority split</div><div class="donut-wrap"><svg width="80" height="80" viewBox="0 0 80 80">${donut([pH,pM,pL],['var(--red)','var(--amb)','var(--grn)'])}</svg><div class="legend"><div class="li"><div class="ld" style="background:var(--red)"></div>High (${pH})</div><div class="li"><div class="ld" style="background:var(--amb)"></div>Med (${pM})</div><div class="li"><div class="ld" style="background:var(--grn)"></div>Low (${pL})</div></div></div></div>
    <div class="cc-card"><div class="cc-title">Workload per member</div>${mWork.length===0?`<div style="font-size:12px;color:var(--text3)">No data</div>`:`<div style="display:flex;flex-direction:column;gap:7px">${mWork.map(m=>`<div><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span>${m.name.split(' ')[0]}</span><span style="color:var(--text2)">${m.count}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${Math.round(m.count/maxM*100)}%"></div></div></div>`).join('')}</div>`}</div>
    <div class="cc-card"><div class="cc-title">Deadline timeline</div>${tasks.filter(t=>t.status!=='done'&&t.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,6).map(t=>`<div class="tl-row"><span class="dl ${dlCls(t.deadline)}" style="width:60px;font-size:10px">${dlLbl(t.deadline)}</span><span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</span></div>`).join('')||`<div style="font-size:12px;color:var(--text3)">None</div>`}</div>
  </div>`;

function donut(vals,colors){
  const total=vals.reduce((a,b)=>a+b,0);if(!total)return`<circle cx="40" cy="40" r="30" fill="none" stroke="var(--bg4)" stroke-width="12"/>`;
  let angle=-Math.PI/2,svg='';
  vals.forEach((v,i)=>{const s=(v/total)*2*Math.PI;const x1=40+30*Math.cos(angle),y1=40+30*Math.sin(angle);const x2=40+30*Math.cos(angle+s),y2=40+30*Math.sin(angle+s);const lg=s>Math.PI?1:0;if(v>0)svg+=`<path d="M40,40 L${x1.toFixed(1)},${y1.toFixed(1)} A30,30 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${colors[i]}" opacity=".85"/>`;angle+=s;});
  svg+=`<circle cx="40" cy="40" r="18" fill="var(--bg2)"/>`;
  const top=vals[0];svg+=`<text x="40" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">${total?Math.round(top/total*100):0}%</text>`;
  return svg;
}

// کاربر درخواست عضویت می‌ده
async function requestJoin(teamId){
  const team=DB.teams[teamId];if(!team)return;
  if(!DB.joinRequests)DB.joinRequests=[];
  // جلوگیری از درخواست تکراری
  if(DB.joinRequests.some(r=>r.teamId===teamId&&r.userId===SESSION.userId&&r.status==='pending'))return;
  DB.joinRequests.push({id:uid(),teamId,userId:SESSION.userId,status:'pending',created:Date.now()});
  // نوتیف به owner و adminها
  const admins=[team.ownerId,...Object.entries(team.roles||{}).filter(([,r])=>r==='admin').map(([id])=>id)];
  admins.forEach(aid=>{
    if(DB.users[aid]){
      addNotif(aid,`<strong>${me().display}</strong> requested to join <strong>${team.name}</strong>`);
      if(DB.users[aid].telegramId)tgSend(DB.users[aid].telegramId,`👋 <b>TeamFlow</b>\n${me().display} wants to join your team "${team.name}"\n\nReview the request in the app.`);
    }
  });
  await Promise.all([svMeta(),...admins.filter(a=>DB.users[a]).map(a=>svUser(a))]);
  renderApp();
}

// owner/admin درخواست رو تأیید می‌کنه
async function approveJoin(reqId){
  const req=(DB.joinRequests||[]).find(r=>r.id===reqId);if(!req)return;
  const team=DB.teams[req.teamId];const u=DB.users[req.userId];
  if(!team||!u){req.status='rejected';await svMeta();renderApp();return;}
  req.status='approved';
  if(!(team.members||[]).includes(req.userId)){
    team.members.push(req.userId);
    if(!team.roles)team.roles={};
    team.roles[req.userId]='member';
    // اگه قبلاً removed بوده پاکش کن
    team.removedMembers=(team.removedMembers||[]).filter(id=>id!==req.userId);
  }
  addAct(team.id,'ti-user-plus','var(--grng)',`<strong>${u.display}</strong> joined the team 🎉`);
  addNotif(req.userId,`Your request to join <strong>${team.name}</strong> was approved! Welcome aboard 🎉`);
  if(u.telegramId)tgSend(u.telegramId,`🎉 <b>TeamFlow</b>\nYour request to join "${team.name}" was approved!\n\nWelcome to the family.`);
  await Promise.all([svMeta(),svTeam(team.id),svUser(req.userId)]);
  renderApp();
}

// owner/admin درخواست رو رد می‌کنه
async function rejectJoin(reqId){
  const req=(DB.joinRequests||[]).find(r=>r.id===reqId);if(!req)return;
  req.status='rejected';
  const team=DB.teams[req.teamId];
  if(team&&DB.users[req.userId]){
    addNotif(req.userId,`Your request to join <strong>${team.name}</strong> wasn't accepted this time.`);
  }
  await Promise.all([svMeta(),DB.users[req.userId]?svUser(req.userId):Promise.resolve()]);
  renderApp();
}

    </div>`;

async function sendInvite(){
  const username=document.getElementById('M_INV_USER').value.trim().toLowerCase();
  const team=getTeam();if(!team)return;
  const msg=document.getElementById('INV_MSG');
  if(!canInvite(team)){msg.style.color='var(--red)';msg.textContent='Only Owner or Admin can invite members';return}
  const target=Object.values(DB.users).find(u=>u.username===username);
  if(!target){msg.style.color='var(--red)';msg.textContent='User @'+username+' not found';return}
  if(target.id===SESSION.userId){msg.style.color='var(--red)';msg.textContent='You cannot invite yourself';return}
  if(team.members.includes(target.id)){msg.style.color='var(--red)';msg.textContent='@'+username+' is already in this team';return}
  if(DB.invites.find(i=>i.teamId===team.id&&i.toUserId===target.id&&i.status==='pending')){msg.style.color='var(--red)';msg.textContent='Already sent an invite to @'+username;return}
  // انتخاب role برای invite
  const selectedRole=document.getElementById('M_INV_ROLE')?.value||'member';
  DB.invites.push({id:uid(),teamId:team.id,fromUserId:SESSION.userId,toUserId:target.id,status:'pending',role:selectedRole,ts:Date.now()});
  addNotif(target.id,`@${me().username} invited you to join team <strong>${team.name}</strong>`);
  addAct(team.id,'ti-mail','var(--accg)',`Invite sent to <strong>@${target.username}</strong> as ${selectedRole}`);
  msg.style.color='var(--grn)';msg.textContent='Invite sent to @'+username+'!';
  await Promise.all([svTeam(team.id), svMeta(), sv('user:'+target.id)]);
  setTimeout(()=>{closeModal();renderApp()},800);
}

// FIX: respondInvite no longer calls loadDB() — works on current state
async function respondInvite(invId,accept){
  const inv=DB.invites.find(i=>i.id===invId);
  if(!inv||inv.toUserId!==SESSION.userId)return;
  inv.status=accept?'accepted':'declined';
  if(accept){
    const team=DB.teams[inv.teamId];
    if(team){
      if(!Array.isArray(team.members))team.members=[];
      if(Array.isArray(team.removedMembers))team.removedMembers=team.removedMembers.filter(id=>id!==inv.toUserId);
      const wasMember=team.members.includes(inv.toUserId);
      [team.ownerId,inv.fromUserId,inv.toUserId].filter(Boolean).forEach(uid=>{
        if(!team.members.includes(uid))team.members.push(uid);
      });
      // role رو از invite بگیر، default: member
      if(!team.roles)team.roles={};
      if(inv.toUserId!==team.ownerId) team.roles[inv.toUserId]=inv.role||'member';
      if(!wasMember){
        addAct(inv.teamId,'ti-user-check','var(--grng)',`<strong>${me().display}</strong> joined the team`);
        addNotif(inv.fromUserId,`<strong>${me().display}</strong> accepted your invite to <strong>${team.name}</strong>!`);
      }
      UI.activeTeam=inv.teamId;UI.page='tasks';
    }
  } else {
    addNotif(inv.fromUserId,`@${me().username} declined the invite to <strong>${DB.teams[inv.teamId]?.name}</strong>`);
  }
  const jobs=[svMeta()];
  if(accept && DB.teams[inv.teamId]) jobs.push(svTeam(inv.teamId));
  jobs.push(svUser());
  await Promise.all(jobs);
  renderApp();
}

// ── @Mention System ────────────────────────────────────────────
let _mentionActiveIdx=0;

function highlightMentions(text,team){
  if(!text)return'';
  // اسکیپ HTML خطرناک ساده
  const esc=text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(/@([a-zA-Z0-9_]+)/g,(match,uname)=>{
    const found=(team.members||[]).map(mid=>DB.users[mid]).find(u=>u&&u.username===uname);
    return found?`<span class="mention-tag">@${uname}</span>`:match;
  });
}

function extractMentions(text,team){
  const usernames=[...text.matchAll(/@([a-zA-Z0-9_]+)/g)].map(m=>m[1]);
  const uniqueNames=[...new Set(usernames)];
  return uniqueNames.map(uname=>(team.members||[]).map(mid=>DB.users[mid]).find(u=>u&&u.username===uname)).filter(Boolean);
}

function getMentionQuery(input){
  const pos=input.selectionStart;
  const text=input.value.slice(0,pos);
  const match=text.match(/@([a-zA-Z0-9_]*)$/);
  return match?match[1]:null;
}

function onCommentInput(taskId){
  const input=document.getElementById('C_TEXT');
  const dd=document.getElementById('MENTION_DD');
  if(!input||!dd)return;
  const team=getTeam();if(!team)return;
  const query=getMentionQuery(input);
  if(query===null){dd.style.display='none';return;}
  const matches=(team.members||[]).map(mid=>DB.users[mid]).filter(u=>u&&u.id!==SESSION.userId&&u.username.toLowerCase().startsWith(query.toLowerCase()));
  if(matches.length===0){dd.style.display='none';return;}
  _mentionActiveIdx=0;
  dd.style.display='block';
  dd.innerHTML=matches.map((u,i)=>`
    <div class="mention-item${i===0?' hi':''}" data-idx="${i}" data-username="${u.username}" onclick="selectMention('${u.username}')">
      <div class="av av-xs" style="background:${ac(u.display)}22;color:${ac(u.display)}">${ini(u.display)}</div>
      <span>${u.display}</span><span style="color:var(--text3)">@${u.username}</span>
    </div>`).join('');
}

function onCommentKeydown(event,taskId){
  const dd=document.getElementById('MENTION_DD');
  const isOpen=dd&&dd.style.display==='block';
  if(isOpen){
    const items=dd.querySelectorAll('.mention-item');
    if(event.key==='ArrowDown'){event.preventDefault();_mentionActiveIdx=Math.min(_mentionActiveIdx+1,items.length-1);updateMentionHighlight(items);return;}
    if(event.key==='ArrowUp'){event.preventDefault();_mentionActiveIdx=Math.max(_mentionActiveIdx-1,0);updateMentionHighlight(items);return;}
    if(event.key==='Enter'||event.key==='Tab'){
      event.preventDefault();
      const active=items[_mentionActiveIdx];
      if(active)selectMention(active.dataset.username);
      return;
    }
    if(event.key==='Escape'){dd.style.display='none';return;}
  }
  if(event.key==='Enter'&&!isOpen){addComment(taskId);}
}

function updateMentionHighlight(items){
  items.forEach((el,i)=>el.classList.toggle('hi',i===_mentionActiveIdx));
}

function selectMention(username){
  const input=document.getElementById('C_TEXT');
  const dd=document.getElementById('MENTION_DD');
  if(!input)return;
  const pos=input.selectionStart;
  const text=input.value;
  const before=text.slice(0,pos).replace(/@([a-zA-Z0-9_]*)$/,'@'+username+' ');
  const after=text.slice(pos);
  input.value=before+after;
  const newPos=before.length;
  input.focus();
  input.setSelectionRange(newPos,newPos);
  if(dd)dd.style.display='none';
}


async function addComment(taskId){
  const text=document.getElementById('C_TEXT').value.trim();if(!text)return;
  const team=getTeam();if(!team)return;
  const task=team.tasks.find(t=>t.id===taskId);if(!task)return;
  const author=me().display;
  if(!task.comments)task.comments=[];
  task.comments.push({id:uid(),author,authorId:SESSION.userId,text,ts:Date.now()});
  addAct(team.id,'ti-message-2','var(--accg)',`<strong>${author}</strong> commented on <strong>"${task.title}"</strong>`);
  // notif معمولی برای assignee ها
  (task.assignees||[]).filter(mid=>mid!==SESSION.userId).forEach(mid=>{addNotif(mid,`${author} commented on "${task.title}"`)});
  // notif مخصوص برای کسانی که با @ منشن شدن
  const mentioned=extractMentions(text,team);
  mentioned.forEach(u=>{
    if(u.id===SESSION.userId)return;
    addNotif(u.id,`<strong>${author}</strong> mentioned you in a comment on <strong>"${task.title}"</strong>`);
    if(u.telegramId){
      tgSend(u.telegramId,`💬 <b>TeamFlow</b>\n${author} mentioned you in a comment!\n\n📋 <b>${task.title}</b>\nTeam: ${team.name}\n\n"${text}"`);
    }
  });
  await svTeam(team.id);closeModal();openModal('viewTask',taskId);
}

async function quickStatus(id){
  const team=getTeam();if(!team)return;
  const task=team.tasks.find(t=>t.id===id);if(!task)return;
  const cycle=['todo','inprogress','review','done','blocked'];
  const i=cycle.indexOf(task.status);task.status=cycle[(i+1)%cycle.length];
  addAct(team.id,'ti-arrows-exchange','var(--blug)',`<strong>"${task.title}"</strong> → ${STATUS_MAP[task.status]}`);
  if(task.status==='done'){
    task.completedAt=Date.now();
    task.completedBy=SESSION.userId;
    // اگه owner خودش تسک رو done کرد، خودکار تایید میشه. در غیر این صورت منتظر تایید owner می‌مونه
    if(SESSION.userId===team.ownerId){
      task.approved=true;
    }else{
      task.approved=false;
      // به owner اطلاع بده که یه تسک منتظر تاییده
      if(team.ownerId!==SESSION.userId){
        addNotif(team.ownerId,`<strong>${me().display}</strong> completed <strong>"${task.title}"</strong> — needs your approval`);
        const owner=DB.users[team.ownerId];
        if(owner?.telegramId) tgSend(owner.telegramId,`✅ <b>TeamFlow</b>\n${me().display} completed a task and needs your approval!\n\n📋 <b>${task.title}</b>\nTeam: ${team.name}`);
      }
    }
    (task.assignees||[]).filter(m=>m!==SESSION.userId).forEach(mid=>addNotif(mid,`"${task.title}" was completed`));
  }
  await svTeam(team.id);renderApp();
}

// فقط owner می‌تونه تسک رو تایید کنه تا امتیازش ثبت بشه
async function approveTask(taskId){
  const team=getTeam();if(!team||team.ownerId!==SESSION.userId)return;
  const task=team.tasks.find(t=>t.id===taskId);if(!task)return;
  task.approved=true;
  addAct(team.id,'ti-circle-check','var(--grng)',`<strong>${me().display}</strong> approved <strong>"${task.title}"</strong>`);
  (task.assignees||[]).filter(mid=>mid!==SESSION.userId).forEach(mid=>{
    addNotif(mid,`Your task <strong>"${task.title}"</strong> was approved! Points added.`);
    const m=DB.users[mid];
    if(m?.telegramId) tgSend(m.telegramId,`🎉 <b>TeamFlow</b>\nYour task was approved!\n\n📋 <b>${task.title}</b>\nTeam: ${team.name}\nPoints have been added to your score.`);
  });
  await svTeam(team.id);closeModal();renderApp();
}

// owner می‌تونه رد کنه و برگردونه به review برای اصلاح
async function rejectTask(taskId){
  const team=getTeam();if(!team||team.ownerId!==SESSION.userId)return;
  const task=team.tasks.find(t=>t.id===taskId);if(!task)return;
  task.status='review';
  task.approved=null;
  addAct(team.id,'ti-circle-x','var(--redg)',`<strong>${me().display}</strong> sent <strong>"${task.title}"</strong> back for review`);
  (task.assignees||[]).filter(mid=>mid!==SESSION.userId).forEach(mid=>{
    addNotif(mid,`Your task <strong>"${task.title}"</strong> needs more work — sent back to review`);
    const m=DB.users[mid];
    if(m?.telegramId) tgSend(m.telegramId,`↩️ <b>TeamFlow</b>\nYour task was sent back for review.\n\n📋 <b>${task.title}</b>\nTeam: ${team.name}`);
  });
  await svTeam(team.id);closeModal();renderApp();
}

async function saveProfile(){
  const u=me();if(!u)return;
  const msg=document.getElementById('PROFILE_MSG');
  const newEmail=document.getElementById('M_EMAIL').value.trim().toLowerCase();
  const oldEmail=(u.email||'').toLowerCase();

  if(newEmail&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)){
    if(msg){msg.style.color='var(--red)';msg.textContent='Please enter a valid email address';}
    return;
  }
  // چک کن ایمیل تکراری نباشه (برای یوزر دیگه)
  if(newEmail&&Object.values(DB.users).find(x=>x.id!==u.id&&(x.email||'').toLowerCase()===newEmail)){
    if(msg){msg.style.color='var(--red)';msg.textContent='This email is already used by another account';}
    return;
  }

  u.display=document.getElementById('M_DISPLAY').value.trim()||u.display;
  u.role=document.getElementById('M_ROLE').value.trim();
  u.telegramId=document.getElementById('M_TG').value.trim()||null;
  u.skills=[...tmpSkills];

  const emailChanged=newEmail!==oldEmail;
  if(emailChanged){
    u.email=newEmail||null;
    if(newEmail){
      // ایمیل جدید/تغییریافته باید دوباره verify بشه
      u.verified=false;
      const sent=await sendVerificationEmail(u);
      await svUser();
      if(sent){
        closeModal();renderApp();
        // نمایش پیام بعد از رندر مجدد پروفایل
        setTimeout(()=>{
          const p=document.getElementById('CONTENT');
          if(p) p.insertAdjacentHTML('afterbegin',`<div style="background:var(--ambg);border:1px solid var(--amb);border-radius:var(--rl);padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--amb)"><i class="ti ti-mail"></i> Verification email sent to ${newEmail}. Please check your inbox to verify your new email.</div>`);
        },50);
      }else{
        closeModal();renderApp();
      }
      return;
    }else{
      u.verified=false;
    }
  }

  await svUser();closeModal();renderApp();
}

// FIX: leaveTeam no longer calls loadDB() before modifying state
// This was the main cause of "rejoin after leave" bug
async function leaveTeam(){
  const team=getTeam();if(!team)return;
  if(team.ownerId===SESSION.userId){
    const remaining=(team.members||[]).filter(m=>m!==SESSION.userId);
    if(remaining.length){
      if(!confirm('You are the owner. Transfer ownership and leave this team?'))return;
      team.ownerId=remaining[0];
      if(!team.removedMembers)team.removedMembers=[];
      if(!team.removedMembers.includes(SESSION.userId))team.removedMembers.push(SESSION.userId);
      team.members=remaining;
      (team.tasks||[]).forEach(t=>{if(t.assignees)t.assignees=t.assignees.filter(a=>a!==SESSION.userId)});
      addAct(team.id,'ti-door-exit','var(--redg)',`<strong>${me().display}</strong> left the team`);
      addNotif(team.ownerId,`You are now the owner of team <strong>${team.name}</strong>`);
    }else{
      if(!confirm('You are the only member. Delete this team?'))return;
      if(!DB.deletedTeams)DB.deletedTeams=[];
      if(!DB.deletedTeams.includes(team.id))DB.deletedTeams.push(team.id);
      delete DB.teams[team.id];
    }
  }else{
    if(!confirm('Leave this team?'))return;
    if(!team.removedMembers)team.removedMembers=[];
    if(!team.removedMembers.includes(SESSION.userId))team.removedMembers.push(SESSION.userId);
    team.members=(team.members||[]).filter(m=>m!==SESSION.userId);
    (team.tasks||[]).forEach(t=>{if(t.assignees)t.assignees=t.assignees.filter(a=>a!==SESSION.userId)});
    addAct(team.id,'ti-door-exit','var(--redg)',`<strong>${me().display}</strong> left the team`);
  }
  UI.activeTeam=myTeams()[0]?.id||null;
  // FIX: باید team row رو هم save کنیم چون members تغییر کرده
  const saveJobs=[svMeta(), svUser()];
  if(DB.teams[team.id]) saveJobs.push(svTeam(team.id));
  await Promise.all(saveJobs);
  renderApp();
}

function setPage(p){
  UI.page=p;saveLocal();renderApp();
  document.body.classList.toggle('on-chat',p==='chat');
  if(p==='chat'){
    startChatPolling();
    // چند بار تلاش کن تا مطمئن بشیم بعد از رندر کامل، پایینه (نه اول پیام‌ها)
    requestAnimationFrame(()=>scrollChatToBottom());
    setTimeout(()=>scrollChatToBottom(),60);
    setTimeout(()=>scrollChatToBottom(),200);
  } else {
    stopChatPolling();
  }
  // explore: دیتای تازه از سرور بگیر تا تیم‌هایی که تازه public شدن دیده بشن
  if(p==='explore'){
    loadDB().then(()=>{if(UI.page==='explore')renderApp();}).catch(()=>{});
  }
}

function doSearch(q){
  UI.searchQ=q;
  // فقط لیست تسک‌ها رو آپدیت کن، نه کل صفحه — تا focus input حفظ بشه
  const content=document.getElementById('CONTENT');
  if(content&&UI.page==='tasks'){
    const team=getTeam();if(!team)return;
    let tasks=team.tasks||[];
    if(UI.memberFilter)tasks=tasks.filter(t=>(t.assignees||[]).includes(UI.memberFilter));
    if(UI.filter!=='all')tasks=tasks.filter(t=>t.status===UI.filter);
    if(q){const lq=q.toLowerCase();tasks=tasks.filter(t=>t.title.toLowerCase().includes(lq)||(t.description||'').toLowerCase().includes(lq));}
    const listEl=document.getElementById('TASK_LIST');
    if(listEl){
      listEl.innerHTML=tasks.length===0?`<div class="empty"><i class="ti ti-clipboard-x"></i>${q?'No matches':'No tasks yet'}</div>`:tasks.map(t=>renderTaskCard(t,team)).join('');
      return;
    }
  }
  renderApp();
}

function exportData(){
  const team=getTeam();if(!team)return;
  const exp={...team,members:team.members.map(mid=>({id:mid,...DB.users[mid],password:undefined}))};
  const blob=new Blob([JSON.stringify(exp,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=team.name.replace(/\s+/g,'_')+'.json';a.click();
}

async function boot(){
  // اگه لینک verify یا reset باشه، اول اونو پردازش کن
  if(checkAuthLinkParams()) return;

  let retries=3;
  while(retries-->0){
    try{
      await loadDB();
      if(SESSION.userId && !DB.users[SESSION.userId]) SESSION.userId=null;
      render();
      return;
    }catch(err){
      console.error('DB load error, retries left:',retries,err);
      if(retries>0){
        await new Promise(r=>setTimeout(r,2000)); // صبر 2 ثانیه و دوباره امتحان
      }
    }
  }
  // بعد از 3 بار تلاش، اگه کاربر لاگین بود همون حافظه رو نشون بده
  if(SESSION.userId){
    render();
    showSaveIndicator(false,'Offline mode');
  } else {
    document.getElementById('APP').innerHTML=`<div class="auth-screen"><div class="auth-card" style="text-align:center">
      <div class="auth-logo" style="margin-bottom:16px">Team<span>Flow</span></div>
      <div style="color:var(--red);font-size:13px">Could not connect to database.<br>Please check your internet connection and refresh.</div>
    </div></div>`;
  }
}
boot();
