<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0e0e10;--bg2:#16161a;--bg3:#1e1e24;--bg4:#26262e;--bg5:#2e2e38;
--border:#2a2a34;--border2:#3a3a48;
--text:#f0f0f4;--text2:#9898aa;--text3:#5a5a72;
--acc:#7c6ef7;--acc2:#5a4fd6;--accg:rgba(124,110,247,0.14);
--grn:#22d48a;--grng:rgba(34,212,138,0.13);
--amb:#f5a623;--ambg:rgba(245,166,35,0.13);
--red:#f05d5d;--redg:rgba(240,93,93,0.13);
--blu:#4da6ff;--blug:rgba(77,166,255,0.13);
--r:8px;--rl:12px;--rxl:16px;
}
[data-theme="light"]{
--bg:#f5f5f8;--bg2:#ffffff;--bg3:#f0f0f4;--bg4:#e6e6ec;--bg5:#dcdce4;
--border:#e2e2ea;--border2:#d0d0dc;
--text:#16161a;--text2:#5a5a6e;--text3:#8f8fa0;
--acc:#7c6ef7;--acc2:#6a5ce0;--accg:rgba(124,110,247,0.10);
--grn:#1aa669;--grng:rgba(26,166,105,0.10);
--amb:#c9820a;--ambg:rgba(201,130,10,0.10);
--red:#d43f3f;--redg:rgba(212,63,63,0.10);
--blu:#2b7fd6;--blug:rgba(43,127,214,0.10);
}
body{transition:background-color .2s,color .2s}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;font-size:14px}
#APP{min-height:100dvh}

/* ── Mobile bottom nav ── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:200;padding:6px 0 env(safe-area-inset-bottom,6px)}
.mob-nav-inner{display:flex;justify-content:space-around;align-items:center}
.mob-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;border-radius:var(--r);cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;border:none;background:none;font-family:inherit;min-width:48px}
.mob-nav-btn i{font-size:20px}
.mob-nav-btn.on{color:var(--acc)}
.mob-nav-btn .mob-badge{position:absolute;top:2px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--red)}
.mob-nav-btn-wrap{position:relative}

/* ── Mobile sidebar drawer ── */
.mob-drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250}
.mob-drawer-overlay.open{display:block}
.mob-drawer{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);z-index:260;transform:translateX(-100%);transition:transform .25s;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:16px}
.mob-drawer.open{transform:translateX(0)}

.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:600px;padding:24px;position:relative}
.auth-footer{text-align:center;margin-top:18px;font-size:11px;color:var(--text3);letter-spacing:.03em}
.auth-footer span{color:var(--text2);font-weight:500}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;width:380px;max-width:100%}
.auth-logo{font-size:22px;font-weight:800;color:var(--acc);margin-bottom:6px;letter-spacing:-0.5px}
.auth-logo span{color:var(--text)}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.5}
.auth-title{font-size:18px;font-weight:700;margin-bottom:20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.fg input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.fg input:focus{border-color:var(--acc)}
.fg .hint{font-size:11px;color:var(--text3);margin-top:4px}
.fg .err{font-size:11px;color:var(--red);margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap;justify-content:center}
.btn-p{background:var(--acc);color:#fff;width:100%}.btn-p:hover{background:var(--acc2)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-g:hover{background:var(--bg4);color:var(--text)}
.btn-d{background:transparent;color:var(--red);border:1px solid rgba(240,93,93,0.3)}.btn-d:hover{background:var(--redg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:6px 8px;border-radius:var(--r)}.btn-icon:hover{background:var(--bg4);color:var(--text)}
.auth-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--text2)}
.auth-switch a{color:var(--acc);cursor:pointer;text-decoration:none;font-weight:500}
.auth-switch a:hover{text-decoration:underline}
.input-prefix{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.input-prefix:focus-within{border-color:var(--acc)}
.input-prefix span{padding:0 10px;color:var(--text3);font-size:14px;background:var(--bg4);border-right:1px solid var(--border2);height:42px;display:flex;align-items:center;flex-shrink:0}
.input-prefix input{background:none;border:none;outline:none;flex:1;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit}

.app-layout{display:grid;grid-template-rows:52px 1fr auto;min-height:600px;max-height:900px}
.navbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px}
.logo{font-weight:800;font-size:17px;color:var(--acc);letter-spacing:-0.5px;margin-right:4px;flex-shrink:0}
.logo span{color:var(--text)}
.nav-teams{display:flex;gap:5px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-teams::-webkit-scrollbar{display:none}
.tpill{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);white-space:nowrap;transition:all .15s;flex-shrink:0}
.tpill:hover,.tpill.on{border-color:var(--acc);background:var(--accg);color:var(--acc)}
.nb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.user-pill{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500}
.user-pill:hover{border-color:var(--border2)}
.notif-wrap{position:relative}
.notif-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid var(--bg2)}

.main-layout{display:grid;grid-template-columns:220px 1fr;overflow:hidden;height:calc(900px - 52px)}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:16px}
.content{overflow-y:auto;padding:18px 20px;background:var(--bg)}
.sb-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;padding:0 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .12s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.on{background:var(--accg);color:var(--acc)}
.nav-item i{font-size:15px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:20px;background:var(--bg4);color:var(--text2)}
.nav-badge.r{background:var(--redg);color:var(--red)}
.member-row{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:var(--r);cursor:pointer;transition:background .1s}
.member-row:hover{background:var(--bg3)}
.member-row.on{background:var(--accg)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;font-size:11px}
.av-xs{width:22px;height:22px;font-size:9px}
.av-sm{width:28px;height:28px;font-size:11px}
.av-md{width:36px;height:36px;font-size:14px}
.av-lg{width:46px;height:46px;font-size:18px}
.divider{height:1px;background:var(--border);margin:4px 0}

.page-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.page-title{font-size:19px;font-weight:700;letter-spacing:-0.3px;flex:1}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:13px}
.stat-lbl{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-val{font-size:21px;font-weight:700}
.tabs-row{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{padding:7px 13px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all .12s;margin-bottom:-1px}
.tab:hover{color:var(--text)}.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:6px 10px;flex:1;min-width:140px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%;font-family:inherit}
.search-box i{color:var(--text3);font-size:14px}
select.flt{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:6px 9px;color:var(--text);font-size:12px;font-family:inherit;cursor:pointer;outline:none}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:13px;margin-bottom:9px;cursor:pointer;transition:border-color .15s}
.task-card:hover{border-color:var(--border2)}
.task-card.done-c{opacity:.6}
.tc-hdr{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px}
.tc-title{font-size:14px;font-weight:500;flex:1;line-height:1.4}
.tc-title.sk{text-decoration:line-through;color:var(--text2)}
.prio-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px}
.tc-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.b-todo{background:var(--bg4);color:var(--text2)}
.b-inprogress{background:var(--blug);color:var(--blu)}
.b-done{background:var(--grng);color:var(--grn)}
.b-blocked{background:var(--redg);color:var(--red)}
.b-review{background:var(--ambg);color:var(--amb)}
.dl{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:500}
.dl-ok{color:var(--grn)}.dl-soon{color:var(--amb)}.dl-urg{color:var(--red)}
.av-stack{display:flex;margin-left:auto}
.av-stack .av{border:2px solid var(--bg2);margin-left:-5px}
.prog-bar{height:3px;border-radius:2px;background:var(--bg4);overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;background:var(--acc)}
.lbl{padding:1px 6px;border-radius:20px;font-size:10px;font-weight:600}
.cc{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text2)}
.empty{text-align:center;padding:40px 16px;color:var(--text2)}
.empty i{font-size:38px;opacity:.3;display:block;margin-bottom:10px}
.kanban{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.rank-row{display:grid;grid-template-columns:32px 1fr 55px 55px 65px;gap:6px;align-items:center;padding:12px 14px}
.rank-hdr{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);padding:10px 14px}
.kb-mob-tabs{display:none}
.kb-mob-tab{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.kb-col{background:var(--bg3);border-radius:var(--rl);padding:11px;min-height:180px}
.kb-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;font-size:12px;font-weight:600}
.kb-cnt{padding:1px 6px;border-radius:20px;background:var(--bg5);font-size:11px;color:var(--text2)}
.kb-task{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:9px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;font-size:12px}
.kb-task:hover{border-color:var(--border2)}
.modal-wrap{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300;min-height:600px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rxl);padding:22px;width:460px;max-width:96%;max-height:88vh;overflow-y:auto;position:relative}
.modal-w{width:580px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:7px}
.mfg{margin-bottom:13px}
.mfg label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.mfg input,.mfg select,.mfg textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.mfg input:focus,.mfg select:focus,.mfg textarea:focus{border-color:var(--acc)}
.mfg textarea{resize:vertical;min-height:64px}
.mfg select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfooter{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;border-top:1px solid var(--border);padding-top:12px}
.swatches{display:flex;gap:5px;flex-wrap:wrap}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s}
.sw.on{border-color:var(--text)}
.chip-grid{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:4px 9px;border-radius:20px;border:1px solid var(--border2);font-size:12px;cursor:pointer;transition:all .12px;background:var(--bg3)}
.chip.on{background:var(--accg);border-color:var(--acc);color:var(--acc)}
.assignee-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:5px}
.a-chip{display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:var(--r);border:1px solid var(--border2);cursor:pointer;font-size:12px;font-weight:500;background:var(--bg3);transition:all .12s}
.a-chip.on{background:var(--accg);border-color:var(--acc);color:var(--acc)}
.label-row{display:flex;gap:5px;flex-wrap:wrap}
.lp{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:border-color .12s}
.lp.on{border-color:currentColor}
.comment-item{background:var(--bg3);border-radius:var(--r);padding:9px;margin-bottom:7px}
.c-hdr{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.c-name{font-size:12px;font-weight:600}
.c-time{font-size:11px;color:var(--text3)}
.c-text{font-size:12px;line-height:1.5;color:var(--text2)}
.c-input-row{display:flex;gap:7px;margin-top:10px}
.c-input-row input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.c-input-row input:focus{border-color:var(--acc)}
.c-input-wrap{position:relative;flex:1}
.mention-tag{color:var(--acc);font-weight:600;background:var(--accg);padding:0 3px;border-radius:3px}
.mention-dropdown{position:absolute;bottom:100%;left:0;right:0;margin-bottom:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);max-height:160px;overflow-y:auto;z-index:50;box-shadow:0 -4px 16px rgba(0,0,0,.4)}
.mention-item{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:pointer;font-size:12px}
.mention-item:hover,.mention-item.hi{background:var(--bg4)}

/* ── Team Chat ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100dvh - 220px);min-height:340px;background:linear-gradient(180deg,transparent,var(--bg2) 140%);border-radius:var(--rxl)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{width:5px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
.chat-msgs::-webkit-scrollbar-track{background:transparent}
.chat-row{display:flex;gap:9px;max-width:76%;animation:msgIn .28s cubic-bezier(.21,1.02,.73,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.chat-row.own{align-self:flex-end;flex-direction:row-reverse}
.chat-row .av{box-shadow:0 0 0 2px var(--bg),0 2px 8px rgba(0,0,0,.25);align-self:flex-end;margin-bottom:4px}
.chat-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:18px 18px 18px 5px;padding:9px 14px;font-size:13.5px;line-height:1.55;color:var(--text);box-shadow:0 2px 10px rgba(0,0,0,.12);transition:transform .15s;word-break:break-word}
.chat-bubble:hover{transform:translateY(-1px)}
.chat-row.own .chat-bubble{background:linear-gradient(135deg,var(--acc) 0%,#9b8cff 100%);border:none;color:#fff;border-radius:18px 18px 5px 18px;box-shadow:0 4px 14px rgba(124,110,247,.35)}
.chat-row.own .mention-tag{background:rgba(255,255,255,.28);color:#fff}
.chat-meta{display:flex;align-items:center;gap:7px;margin-bottom:3px;padding:0 4px}
.chat-name{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.02em}
.chat-row.own .chat-meta{flex-direction:row-reverse}
.chat-time{font-size:10px;color:var(--text3)}
.chat-input-bar{display:flex;gap:9px;padding:12px;margin-top:8px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;box-shadow:0 4px 20px rgba(0,0,0,.18);align-items:center}
.chat-input-bar .c-input-wrap input{background:var(--bg3);border:1.5px solid transparent;border-radius:14px;padding:11px 16px;font-size:13.5px;transition:all .2s;width:100%}
.chat-input-bar .c-input-wrap input:focus{border-color:var(--acc);background:var(--bg);box-shadow:0 0 0 3px var(--accg)}
.chat-send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--acc) 0%,#9b8cff 100%);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;box-shadow:0 4px 12px rgba(124,110,247,.4)}
.chat-send-btn:hover{transform:scale(1.08) rotate(-8deg);box-shadow:0 6px 18px rgba(124,110,247,.55)}
.chat-send-btn:active{transform:scale(.95)}
.chat-send-btn i{font-size:17px;margin-left:-2px}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px}
.chat-empty-icon{width:72px;height:72px;border-radius:50%;background:var(--accg);display:flex;align-items:center;justify-content:center;animation:emptyPulse 2.4s ease-in-out infinite}
@keyframes emptyPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}
.chat-day-sep{text-align:center;font-size:10.5px;font-weight:600;color:var(--text3);margin:10px auto;padding:3px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;width:fit-content;letter-spacing:.05em;text-transform:uppercase}
.act-item{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.act-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.act-text{font-size:12px;color:var(--text2);line-height:1.5}
.act-text strong{color:var(--text);font-weight:500}
.act-time{font-size:10px;color:var(--text3);margin-top:2px}

const TG_TOKEN = '8984355808:AAHrb-7FjAy7iUcOcPzdthGeMpMmpwQZQi0';

// FIX: صف ارسال + retry برای جلوگیری از گم شدن پیام‌ها
// دلایل قبلی گم شدن پیام: بدون retry، قطعی لحظه‌ای شبکه یا rate-limit تلگرام
// باعث می‌شد پیام برای همیشه از بین بره و فقط یه warning تو Console بمونه.
let _tgQueue=Promise.resolve();

function tgSend(chatId, text){
  if(!chatId){console.warn('tgSend: no chatId');return Promise.resolve(false);}
  // صف: پیام‌ها یکی‌یکی و با فاصله فرستاده میشن تا rate-limit تلگرام نخوریم
  const job=_tgQueue.then(()=>_tgSendWithRetry(chatId,text));
  _tgQueue=job.catch(()=>{}); // اگه یکی fail شد صف متوقف نشه
  return job;
}

async function _tgSendWithRetry(chatId, text, attempt=1){
  const MAX_ATTEMPTS=3;
  console.log(`tgSend to: ${chatId} (attempt ${attempt})`);
  try{
    const res=await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:chatId, text, parse_mode:'HTML'})
    });
    const data=await res.json();

    if(data.ok){
      console.log('Telegram sent OK to',chatId);
      return true;
    }

    // 429 = Too Many Requests — تلگرام میگه چقدر صبر کنیم
    if(res.status===429 && data.parameters?.retry_after && attempt<MAX_ATTEMPTS){
      const waitMs=(data.parameters.retry_after+1)*1000;
      console.warn(`Telegram rate-limited, retrying in ${waitMs}ms...`);
      await new Promise(r=>setTimeout(r,waitMs));
      return _tgSendWithRetry(chatId,text,attempt+1);
    }

    console.error('Telegram error (not retrying):',data);
    return false;
  }catch(e){
    // خطای شبکه (قطعی لحظه‌ای، فیلترینگ و غیره) — دوباره امتحان کن
    if(attempt<MAX_ATTEMPTS){
      const waitMs=1000*attempt; // 1s, 2s
      console.warn(`Telegram network error, retrying in ${waitMs}ms... (${e.message})`);
      await new Promise(r=>setTimeout(r,waitMs));
      return _tgSendWithRetry(chatId,text,attempt+1);
    }
    console.error('Telegram notify failed after retries:',e);
    return false;
  }
}

// ── DB helpers: هر entity یه row جدا توی Supabase ──────────────
// ساختار: { id: "user_xxx" | "team_xxx" | "meta", type: "...", data: {...} }

async function sbUpsert(id, type, data){
  const res=await fetch(SUPABASE_URL+'/rest/v1/teamflow?on_conflict=id',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify({id, type, data})
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
}

// FIX: هر entity مستقل save میشه — بدون _saving flag که باعث block شدن میشد
async function svUser(uid){
  uid=uid||SESSION.userId;
  const u=DB.users[uid];if(!u)return true;
  saveLocal();
  try{await sbUpsert('user_'+uid,'user',u);showSaveIndicator(true);return true;}
  catch(e){console.error('svUser error:',e);showSaveIndicator(false,'Save error');return false;}
}

async function svTeam(teamId){

  catch(e){console.error('svTeam error:',e);showSaveIndicator(false,'Save error');return false;}

async function svMeta(){

    await sbUpsert('meta','meta',{
      invites:DB.invites||[],

// فقط چت یه تیم رو از سرور بخون — برای polling سبک، بدون لود کل DB
async function loadChat(teamId){

    const res=await fetch(SUPABASE_URL+'/rest/v1/teamflow?id=eq.chat_'+teamId+'&select=data',{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}

// sv عمومی — برای backward compatibility
async function sv(scope='all'){
  saveLocal();
  try{
    if(scope==='meta') return await svMeta();
    if(scope.startsWith('user:')) return await svUser(scope.split(':')[1]);
    if(scope.startsWith('team:')) return await svTeam(scope.split(':')[1]);
    if(scope==='all'){
      const jobs=[svMeta()];
      Object.values(DB.users).forEach(u=>jobs.push(svUser(u.id)));
      Object.values(DB.teams).forEach(t=>jobs.push(svTeam(t.id)));
      const results=await Promise.all(jobs);
      return results.every(Boolean);
    }
    return true;
  }catch(e){console.error('sv error:',e);return false;}
}

async function loadDB(){
  let rows;
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/teamflow?select=id,type,data',{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    if(!res.ok) throw new Error(await res.text());
    rows=await res.json();
  }catch(e){
    // اگه شبکه قطع بود، DB رو دست نمی‌زنیم — همون حافظه رو نگه می‌داریم
    console.warn('loadDB failed, keeping current DB in memory:',e);
    throw e; // بالا propagate می‌کنیم تا caller بدونه
  }

  // فقط وقتی data موفق اومد DB رو آپدیت می‌کنیم
  DB={users:{},teams:{},invites:[],deletedTeams:[],deletedTasks:{},chats:{}};

  rows.forEach(row=>{
    if(!row.data) return;
    if(row.type==='user'){
      DB.users[row.data.id]=row.data;
    } else if(row.type==='team'){
      DB.teams[row.data.id]=row.data;
    } else if(row.type==='meta'){
      DB.invites=row.data.invites||[];
      DB.deletedTeams=row.data.deletedTeams||[];
      DB.deletedTasks=row.data.deletedTasks||{};
    } else if(row.type==='chat'){
      const teamId=row.id.replace(/^chat_/,'');
      DB.chats[teamId]=row.data;
    }
  });

  // اعمال deletedTeams و deletedTasks
  DB.deletedTeams.forEach(id=>{delete DB.teams[id]});
  Object.entries(DB.deletedTasks).forEach(([teamId,ids])=>{
    const t=DB.teams[teamId];
    if(t) t.tasks=(t.tasks||[]).filter(task=>!ids.includes(task.id));
  });
  // اعمال removedMembers
  Object.values(DB.teams).forEach(t=>{
    const removed=t.removedMembers||[];
    t.members=(t.members||[]).filter(mid=>!removed.includes(mid));
    (t.tasks||[]).forEach(task=>{
      if(task.assignees) task.assignees=task.assignees.filter(mid=>!removed.includes(mid));
    });
  });
}

}

function uid(){return '_'+Math.random().toString(36).slice(2,10)}
function ini(n){return(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?'}
function ac(n){let s=0;for(let i=0;i<(n||'').length;i++)s+=n.charCodeAt(i);return AC2[s%AC2.length]}
function days(d){return Math.ceil((new Date(d)-Date.now())/(864e5))}
function dlCls(d){const n=days(d);return n<0||n<=3?'dl-urg':n<=7?'dl-soon':'dl-ok'}
function dlLbl(d){const n=days(d);if(n<0)return Math.abs(n)+'d overdue';if(n===0)return'Due today';if(n===1)return'Due tomorrow';return n+'d left'}
function pColor(p){return{high:'var(--red)',medium:'var(--amb)',low:'var(--grn)'}[p]||'var(--text3)'}
function fmt(ts){const d=new Date(ts),diff=Date.now()-d;if(diff<60000)return'just now';if(diff<3600000)return Math.floor(diff/60000)+'m ago';if(diff<86400000)return Math.floor(diff/3600000)+'h ago';return d.toLocaleDateString('en',{month:'short',day:'numeric'})}
function me(){return DB.users[SESSION.userId]}
function myTeams(){return Object.values(DB.teams).filter(t=>t.members&&t.members.includes(SESSION.userId))}
function getTeam(){return UI.activeTeam?DB.teams[UI.activeTeam]:null}
function myInvites(){return DB.invites.filter(i=>i.toUserId===SESSION.userId&&i.status==='pending')}
function addAct(teamId,icon,iconBg,text){const t=DB.teams[teamId];if(!t)return;if(!t.activity)t.activity=[];t.activity.unshift({id:uid(),icon,iconBg,text,ts:Date.now()});if(t.activity.length>60)t.activity=t.activity.slice(0,60)}
function addNotif(userId,text){if(!DB.users[userId])return;if(!DB.users[userId].notifs)DB.users[userId].notifs=[];DB.users[userId].notifs.unshift({id:uid(),text,read:false,ts:Date.now()});if(DB.users[userId].notifs.length>40)DB.users[userId].notifs=DB.users[userId].notifs.slice(0,40)}
function myUnreadNotifs(){const u=me();return(u?.notifs||[]).filter(n=>!n.read).length}

// FIX: اگه ایمیل verification نرسید یا گم شد، کاربر می‌تونه دوباره درخواست بده
async function doResendVerification(){
  const username=document.getElementById('A_USER').value.trim().toLowerCase();
  const err=document.getElementById('AUTH_ERR');
  const info=document.getElementById('AUTH_INFO');
  err.textContent='';info.textContent='';
  if(!username){err.textContent='Please enter your username above first';return}
  try{await loadDB();}catch(e){err.textContent='Could not connect. Try again.';return}
  const found=Object.values(DB.users).find(u=>u.username===username);
  // امنیت: پیام یکسان چه پیدا بشه چه نه، تا کسی نفهمه چه یوزرنیم‌هایی هست
  if(!found||!found.email){
    info.textContent='If this account exists, a verification email has been sent.';
    return;
  }
  if(found.verified){
    info.textContent='This account is already verified. You can sign in.';
    return;
  }
  const sent=await sendVerificationEmail(found);
  await svUser(found.id);
  if(sent) info.textContent='Verification email sent! Check your inbox.';
  else err.textContent='Could not send email right now. Please try again later.';
}

async function doLogin(){
  const user=document.getElementById('A_USER').value.trim().toLowerCase();
  const pass=document.getElementById('A_PASS').value;
  const err=document.getElementById('AUTH_ERR');
  err.textContent='';
  try{await loadDB();}catch(e){console.error('Load error on login',e);}
  const found=Object.values(DB.users).find(u=>u.username===user);
  if(!found||found.password!==btoa(pass)){err.textContent='Wrong username or password';return}
  if(found.verified===false){
    err.textContent='Please verify your email first. Check your inbox for the verification link.';
    return;
  }
  SESSION.userId=found.id;
  const teams=myTeams();UI.activeTeam=teams[0]?.id||null;
  saveLocal();renderApp();
}

async function doRegister(){
  const display=document.getElementById('A_DISPLAY').value.trim();
  const user=document.getElementById('A_USER').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const email=document.getElementById('A_EMAIL').value.trim().toLowerCase();
  const pass=document.getElementById('A_PASS').value;
  const role=document.getElementById('A_ROLE').value.trim();
  const err=document.getElementById('AUTH_ERR');
  if(!display||!user||!email||!pass){err.textContent='Please fill all required fields';return}
  if(user.length<3){err.textContent='Username must be at least 3 characters';return}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='Please enter a valid email address';return}
  try{await loadDB()}catch(e){console.error('DB refresh before register failed',e)}
  if(Object.values(DB.users).find(u=>u.username===user)){err.textContent='Username @'+user+' is already taken';return}
  if(Object.values(DB.users).find(u=>u.email===email)){err.textContent='This email is already registered';return}
  const id=uid();
  const newUser={id,username:user,display:display,email,password:btoa(pass),role,skills:[...regSkillsTmp],telegramId:document.getElementById('A_TG')?.value.trim()||null,notifs:[],verified:false,created:Date.now()};
  DB.users[id]=newUser;
  regSkillsTmp.length=0;

  const emailSent=await sendVerificationEmail(newUser);
  const saved=await svUser(id);

  if(!saved){err.textContent='Could not save account. Please try again.';return}
  if(!emailSent){err.textContent='Account created, but verification email failed to send. Contact support.';return}

  renderAuth('verify-sent');
}

function doLogout(){stopChatPolling();SESSION.userId=null;UI.activeTeam=null;UI.page='tasks';saveLocal();renderAuth('login')}

// FIX: به‌جای reset مستقیم با یوزرنیم، حالا فقط لینک ایمیل درخواست میشه
async function doForgotPassword(){
  const ident=document.getElementById('A_IDENT').value.trim().toLowerCase();
  const err=document.getElementById('AUTH_ERR');
  err.textContent='';
  if(!ident){err.textContent='Please enter your username or email';return}
  try{await loadDB();}catch(e){err.textContent='Could not connect. Try again.';return}
  const found=Object.values(DB.users).find(u=>u.username===ident||u.email===ident);
  // امنیت: چه پیدا بشه چه نشه، همون پیام نشون بده تا کسی نفهمه چه ایمیل‌هایی ثبت‌نامن
  if(found&&found.email){
    const sent=await sendResetEmail(found);
    await svUser(found.id);
    if(!sent){err.textContent='Could not send email. Please try again later.';return}
  }
  renderAuth('reset-sent');
}

// وقتی از لینک ایمیل با ?reset=TOKEN&uid=ID وارد میشه
async function doSetNewPassword(){
  const pass=document.getElementById('A_PASS').value;
  const pass2=document.getElementById('A_PASS2').value;
  const err=document.getElementById('AUTH_ERR');
  if(!pass){err.textContent='Please enter a new password';return}
  if(pass!==pass2){err.textContent='Passwords do not match';return}
  if(pass.length<4){err.textContent='Password must be at least 4 characters';return}
  const {uid:userId,token}=window._resetParams||{};
  if(!userId||!token){err.textContent='Invalid reset link';return}
  try{await loadDB();}catch(e){err.textContent='Could not connect. Try again.';return}
  const found=DB.users[userId];
  if(!found||found.resetToken!==token){err.textContent='This reset link is invalid or already used';return}
  if(!found.resetExpires||Date.now()>found.resetExpires){err.textContent='This reset link has expired. Please request a new one.';return}
  found.password=btoa(pass);
  found.resetToken=null;
  found.resetExpires=null;
  const ok=await svUser(userId);
  if(ok){
    window._resetParams=null;
    history.replaceState({},'',getBaseUrl());
    renderAuth('login');
  }else{
    err.textContent='Could not save. Try again.';
  }
}

// وقتی از لینک ایمیل با ?verify=TOKEN&uid=ID وارد میشه
async function handleVerifyLink(token,userId){
  try{await loadDB();}catch(e){window._verifyOk=false;renderAuth('verify-result');return;}
  const found=DB.users[userId];
  if(!found||found.verifyToken!==token){window._verifyOk=false;renderAuth('verify-result');return;}
  found.verified=true;
  found.verifyToken=null;
  await svUser(userId);
  window._verifyOk=true;
  history.replaceState({},'',getBaseUrl());
  renderAuth('verify-result');
}

// چک کردن URL موقع لود صفحه برای verify/reset link ها
function checkAuthLinkParams(){
  const params=new URLSearchParams(window.location.search);
  const verifyToken=params.get('verify');
  const resetToken=params.get('reset');
  const userId=params.get('uid');
  if(verifyToken&&userId){
    handleVerifyLink(verifyToken,userId);
    return true;
  }
  if(resetToken&&userId){
    window._resetParams={uid:userId,token:resetToken};
    renderAuth('set-new-password');
    return true;
  }
  return false;
}

function calcPoints(memberId, team){
  const tasks=(team.tasks||[]);
  let pts=0;
  tasks.forEach(t=>{
    // فقط تسک‌های تایید شده امتیاز میدن (تسک‌های owner خودکار تایید میشن)
    if(t.status==='done' && t.approved!==false && (t.assignees||[]).includes(memberId)){
      const base=t.priority==='high'?15:t.priority==='low'?5:10;
      pts+=base;
      // bonus اگه قبل از deadline تموم شده
      if(t.deadline && t.completedAt && new Date(t.completedAt)<=new Date(t.deadline)){
        pts+=5;
      }
    }
    // امتیاز comment
    (t.comments||[]).forEach(c=>{if(c.authorId===memberId)pts+=2;});
  });
  return pts;
}

// ── Performance Analytics Engine (rule-based, no API) ────────────
function analyzeMember(memberId, team){
  const tasks=(team.tasks||[]).filter(t=>(t.assignees||[]).includes(memberId));
  const done=tasks.filter(t=>t.status==='done');
  const active=tasks.filter(t=>t.status==='inprogress');
  const blocked=tasks.filter(t=>t.status==='blocked');
  const overdue=tasks.filter(t=>t.status!=='done'&&t.deadline&&days(t.deadline)<0);

  const total=tasks.length;
  const completionRate=total?Math.round(done.length/total*100):0;

  // میانگین زمان تکمیل (روز) — از created تا completedAt
  let avgDays=null;
  const timed=done.filter(t=>t.created&&t.completedAt);
  if(timed.length){
    const sum=timed.reduce((a,t)=>a+(t.completedAt-t.created)/864e5,0);
    avgDays=Math.round(sum/timed.length*10)/10;
  }

  // وقت‌شناسی: چند درصد تسک‌های ددلاین‌دار سر وقت تموم شدن
  const withDeadline=done.filter(t=>t.deadline&&t.completedAt);
  let onTimeRate=null;
  if(withDeadline.length){
    const onTime=withDeadline.filter(t=>new Date(t.completedAt)<=new Date(t.deadline+'T23:59:59')).length;
    onTimeRate=Math.round(onTime/withDeadline.length*100);
  }

  // روند: مقایسه نیمه دوم تسک‌های done با نیمه اول (بر اساس زمان تکمیل)
  let trend='steady';
  const doneSorted=[...done].filter(t=>t.completedAt).sort((a,b)=>a.completedAt-b.completedAt);
  if(doneSorted.length>=4){
    const half=Math.floor(doneSorted.length/2);
    const firstHalf=doneSorted.slice(0,half);
    const secondHalf=doneSorted.slice(half);
    const rate=arr=>{const wd=arr.filter(t=>t.deadline);return wd.length?wd.filter(t=>new Date(t.completedAt)<=new Date(t.deadline+'T23:59:59')).length/wd.length:null;};
    const r1=rate(firstHalf),r2=rate(secondHalf);
    if(r1!==null&&r2!==null){
      if(r2>r1+0.15)trend='improving';
      else if(r2<r1-0.15)trend='declining';
    }
  }

  // امتیاز سلامت (0-100): ترکیبی از completion, onTime, و جریمه overdue/blocked
  let health=50;
  health+=completionRate*0.3;              // تا +30
  if(onTimeRate!==null)health+=onTimeRate*0.2; // تا +20
  else health+=10;                          // اگه ددلاینی نبوده، خنثی
  health-=overdue.length*8;                  // جریمه هر overdue
  health-=blocked.length*4;                  // جریمه هر blocked
  health=Math.max(0,Math.min(100,Math.round(health)));

  // خلاصه متنی هوشمند
  let summary,summaryColor;
  if(total===0){summary='No tasks assigned yet';summaryColor='var(--text3)';}
  else if(health>=80){summary='Excellent — reliable & on track';summaryColor='var(--grn)';}
  else if(health>=60){summary='Good — steady performer';summaryColor='var(--blu)';}
  else if(health>=40){summary='Needs attention — some delays';summaryColor='var(--amb)';}
  else{summary='At risk — falling behind';summaryColor='var(--red)';}

  if(overdue.length>0)summary+=` · ${overdue.length} overdue`;
  if(trend==='improving')summary+=' · 📈 improving';
  else if(trend==='declining')summary+=' · 📉 declining';

  return{total,done:done.length,active:active.length,blocked:blocked.length,overdue:overdue.length,completionRate,avgDays,onTimeRate,trend,health,summary,summaryColor};
}

// ── Smart Assignee Suggestion ───────────────────────────────────
function suggestAssignees(skill, team){
  const members=(team.members||[]).map(mid=>DB.users[mid]).filter(Boolean);
  const scored=members.map(m=>{
    const perf=analyzeMember(m.id,team);
    let score=0;
    const reasons=[];

    // ۱. تخصص: skill رو داره؟
    const hasSkill=skill&&(m.skills||[]).includes(skill);
    if(hasSkill){score+=40;reasons.push(`has ${skill} skill`);}

    // ۲. بار کاری: کمتر تسک فعال = بهتر
    const load=perf.active+perf.blocked;
    if(load===0){score+=25;reasons.push('fully available');}
    else if(load<=2){score+=15;reasons.push('light workload');}
    else if(load<=4){score+=5;}
    else{score-=10;reasons.push('busy');}

    // ۳. قابلیت اعتماد: نرخ وقت‌شناسی
    if(perf.onTimeRate!==null){
      if(perf.onTimeRate>=80){score+=20;reasons.push('very reliable');}
      else if(perf.onTimeRate>=60){score+=10;}
      else if(perf.onTimeRate<40){score-=5;}
    }

    // ۴. سلامت کلی
    score+=perf.health*0.15; // تا +15

    // جریمه overdue
    if(perf.overdue>0){score-=perf.overdue*5;reasons.push(`${perf.overdue} overdue`);}

    return{member:m,score:Math.round(score),reasons,hasSkill,load,perf};
  });

  // مرتب‌سازی: اول کسانی که skill دارن، بعد امتیاز
  scored.sort((a,b)=>{
    if(a.hasSkill!==b.hasSkill)return b.hasSkill-a.hasSkill;
    return b.score-a.score;
  });
  return scored;
}

// ── Personal Task Prioritization ─────────────────────────────────
function prioritizeMyTasks(){
  // همه تسک‌های من در همه تیم‌ها که هنوز done نشدن
  const myTasks=[];
  Object.values(DB.teams).forEach(team=>{
    if(!team.members?.includes(SESSION.userId))return;
    (team.tasks||[]).forEach(t=>{
      if(t.status==='done')return;
      if(!(t.assignees||[]).includes(SESSION.userId))return;
      myTasks.push({task:t,team});
    });
  });

  // امتیاز فوریت برای هر تسک
  myTasks.forEach(item=>{
    const t=item.task;
    let urgency=0;
    const reasons=[];

    // ددلاین
    if(t.deadline){
      const d=days(t.deadline);
      if(d<0){urgency+=100;reasons.push(`${Math.abs(d)}d overdue`);}
      else if(d===0){urgency+=80;reasons.push('due today');}
      else if(d===1){urgency+=60;reasons.push('due tomorrow');}
      else if(d<=3){urgency+=40;reasons.push(`${d}d left`);}
      else if(d<=7){urgency+=20;reasons.push(`${d}d left`);}
      else{urgency+=5;reasons.push(`${d}d left`);}
    }

    // اولویت
    if(t.priority==='high'){urgency+=30;reasons.push('high priority');}
    else if(t.priority==='medium')urgency+=15;
    else urgency+=5;

    // پیشرفت: تسکی که نزدیک تمومه ارزش بستن داره
    if(t.progress>=70){urgency+=15;reasons.push('almost done');}
    else if(t.progress>=40)urgency+=8;

    // in-progress یعنی داری روش کار می‌کنی
    if(t.status==='inprogress'){urgency+=10;}

    item.urgency=urgency;
    item.reasons=reasons;
    item.isBlocked=t.status==='blocked';
  });

  // بلاک‌شده‌ها جدا
  const blocked=myTasks.filter(i=>i.isBlocked).sort((a,b)=>b.urgency-a.urgency);
  const activeTasks=myTasks.filter(i=>!i.isBlocked).sort((a,b)=>b.urgency-a.urgency);

  // دسته‌بندی
  const now=[],week=[],later=[];
  activeTasks.forEach(item=>{
    const d=item.task.deadline?days(item.task.deadline):999;
    if(d<0||d<=1||item.task.priority==='high'&&d<=3)now.push(item);
    else if(d<=7)week.push(item);
    else later.push(item);
  });

  return{now,week,later,blocked,total:myTasks.length};
}

  if(p.active>5)tips.push('is juggling a lot of active tasks — consider rebalancing their workload');
  if(p.onTimeRate!==null&&p.onTimeRate<50)tips.push('often misses deadlines — deadlines might be too tight');
  if(p.trend==='improving')tips.push('is trending upward — great momentum! 📈');
  if(p.trend==='declining')tips.push('performance is slipping lately — worth a check-in');
  if(p.health>=80&&tips.length===0)tips.push('is a reliable, strong performer — great to have on the team! ⭐');
  if(tips.length===0)tips.push('is performing steadily with no red flags');
  return `<b>${m.display.split(' ')[0]}</b> ${tips.join('. ')}.`;
}

// ── Team Insights Engine (6 analyses) ────────────────────────────
function generateTeamInsights(team){
  const insights=[];
  const members=(team.members||[]).map(mid=>DB.users[mid]).filter(Boolean);
  const tasks=team.tasks||[];
  const activeTasks=tasks.filter(t=>t.status!=='done');

  // ── ۱. عدم تعادل تیم (Workload Imbalance) ──
  const loadPerMember=members.map(m=>({
    m, load:activeTasks.filter(t=>(t.assignees||[]).includes(m.id)).length
  }));
  const totalLoad=loadPerMember.reduce((a,x)=>a+x.load,0);
  if(totalLoad>0&&members.length>=2){
    const sorted=[...loadPerMember].sort((a,b)=>b.load-a.load);
    const top=sorted[0], idle=sorted.filter(x=>x.load===0);
    const topShare=top.load/totalLoad;
    if(topShare>=0.5&&top.load>=3){
      insights.push({
        type:'imbalance',icon:'⚖️',color:'var(--amb)',
        title:'Workload imbalance',
        text:`<b>${top.m.display}</b> is handling ${Math.round(topShare*100)}% of all active tasks (${top.load} tasks)${idle.length?`, while ${idle.length} member${idle.length>1?'s are':' is'} idle`:''}. Consider redistributing.`
      });
    } else if(idle.length>=Math.ceil(members.length/2)&&totalLoad>=members.length){
      insights.push({
        type:'imbalance',icon:'⚖️',color:'var(--amb)',
        title:'Uneven distribution',
        text:`${idle.length} of ${members.length} members have no active tasks. Work is concentrated on a few people.`
      });
    }
  }

  // ── ۲. پیش‌بینی ریسک پروژه (Deadline Risk) ──
  // برای هر عضو: سرعت متوسط (تسک در روز) رو حساب کن و ببین چند تا تسک تا ددلاین ممکنه عقب بمونه
  let atRiskCount=0;
  const riskTasks=[];
  activeTasks.forEach(t=>{
    if(!t.deadline)return;
    const d=days(t.deadline);
    if(d<0){atRiskCount++;riskTasks.push(t);return;}
    // تخمین: اگه ددلاین نزدیکه و پیشرفت کمه
    if(d<=3&&(t.progress||0)<40){atRiskCount++;riskTasks.push(t);}
  });
  if(atRiskCount>0){
    insights.push({
      type:'risk',icon:'🎯',color:'var(--red)',
      title:'Project risk',
      text:`<b>${atRiskCount} task${atRiskCount>1?'s are':' is'}</b> likely to miss ${atRiskCount>1?'their':'its'} deadline (overdue or low progress with little time left). ${riskTasks.slice(0,2).map(t=>`"${t.title}"`).join(', ')}${riskTasks.length>2?'…':''}`
    });
  }

  // ── ۳. تشخیص Skill Gap ──
  // برای هر skill که توی تسک‌های فعال لازمه، ببین چند نفر اون skill رو دارن
  const skillDemand={};
  activeTasks.forEach(t=>{if(t.skills)skillDemand[t.skills]=(skillDemand[t.skills]||0)+1;});
  Object.entries(skillDemand).forEach(([skill,demand])=>{
    const supply=members.filter(m=>(m.skills||[]).includes(skill)).length;
    if(demand>=3&&supply<=1){
      insights.push({
        type:'skillgap',icon:'🧩',color:'var(--blu)',
        title:`Skill bottleneck: ${skill}`,
        text:`${demand} active tasks need <b>${skill}</b>, but only ${supply} member${supply===1?' has':'s have'} this skill. This is a bottleneck — consider training or hiring.`
      });
    }
  });

  // ── ۴. خطر Burnout ──
  const memberPerfs=members.map(m=>({m,p:analyzeMember(m.id,team),load:activeTasks.filter(t=>(t.assignees||[]).includes(m.id)).length}));
  const avgLoad=totalLoad/Math.max(1,members.length);
  memberPerfs.forEach(({m,p,load})=>{
    // بار کاری بالای دو برابر میانگین + روند نزولی یا تأخیر
    if(load>=avgLoad*2&&load>=4){
      const declining=p.trend==='declining'||(p.onTimeRate!==null&&p.onTimeRate<60);
      if(declining){
        insights.push({
          type:'burnout',icon:'🔥',color:'var(--red)',
          title:'Burnout risk',
          text:`<b>${m.display}</b> has ${load} active tasks (${Math.round(load/avgLoad)}× the team average) and their reliability is dropping. They may be overloaded — check in with them.`
        });
      } else {
        insights.push({
          type:'burnout',icon:'⚠️',color:'var(--amb)',
          title:'Heavy workload',
          text:`<b>${m.display}</b> is carrying ${load} active tasks — well above average. Keep an eye on them to prevent burnout.`
        });
      }
    }
  });

  // اگه هیچ مشکلی نبود
  if(insights.length===0){
    insights.push({
      type:'ok',icon:'✅',color:'var(--grn)',
      title:'All looks healthy',
      text:'No major risks detected. Workload is balanced, no critical bottlenecks, and no one appears overloaded. Great job! 🎉'
    });
  }

  return insights;
}

// ── ۵. خلاصه هفتگی ──
function generateWeeklySummary(team){
  const weekAgo=Date.now()-7*864e5;
  const tasks=team.tasks||[];
  const completedThisWeek=tasks.filter(t=>t.status==='done'&&t.completedAt&&t.completedAt>=weekAgo);
  const createdThisWeek=tasks.filter(t=>t.created&&t.created>=weekAgo);
  const overdueNow=tasks.filter(t=>t.status!=='done'&&t.deadline&&days(t.deadline)<0);

  // بهترین عملکرد این هفته (بیشترین تسک done)
  const doneByMember={};
  completedThisWeek.forEach(t=>{(t.assignees||[]).forEach(mid=>{doneByMember[mid]=(doneByMember[mid]||0)+1;});});
  let topPerformer=null,topCount=0;
  Object.entries(doneByMember).forEach(([mid,cnt])=>{if(cnt>topCount){topCount=cnt;topPerformer=DB.users[mid];}});

  return{
    completed:completedThisWeek.length,
    created:createdThisWeek.length,
    overdue:overdueNow.length,
    topPerformer,topCount
  };
}

// ── ۶. پیشنهاد ددلاین واقع‌بینانه ──
function suggestDeadline(skill, team){
  // بر اساس بار کاری فعلی افرادی که این skill رو دارن + میانگین زمان تکمیل تیم
  const members=(team.members||[]).map(mid=>DB.users[mid]).filter(Boolean);
  const capable=skill?members.filter(m=>(m.skills||[]).includes(skill)):members;
  const pool=capable.length?capable:members;

  // میانگین بار کاری این افراد
  const activeTasks=(team.tasks||[]).filter(t=>t.status!=='done');
  const avgLoad=pool.length?pool.reduce((a,m)=>a+activeTasks.filter(t=>(t.assignees||[]).includes(m.id)).length,0)/pool.length:0;

  // میانگین زمان تکمیل تیم (روز)
  const doneTimed=(team.tasks||[]).filter(t=>t.status==='done'&&t.created&&t.completedAt);
  let avgCompletionDays=3; // پیش‌فرض
  if(doneTimed.length){
    avgCompletionDays=doneTimed.reduce((a,t)=>a+(t.completedAt-t.created)/864e5,0)/doneTimed.length;
  }

  // تخمین: زمان پایه + جریمه بار کاری
  const suggested=Math.max(2,Math.ceil(avgCompletionDays+avgLoad*1.5));
  return{days:suggested,avgLoad:Math.round(avgLoad*10)/10,avgCompletionDays:Math.round(avgCompletionDays*10)/10,poolSize:pool.length,hasSkill:capable.length>0};
}

function renderTaskCard(task,team){
  const assignees=(team.members||[]).map(mid=>DB.users[mid]).filter(m=>m&&(task.assignees||[]).includes(m.id));
  const labels=(task.labels||[]).map(lid=>LABELS.find(l=>l.id===lid)).filter(Boolean);
  const cc=(task.comments||[]).length;
  const isOwner=team.ownerId===SESSION.userId;
  const pendingApproval=task.status==='done'&&task.approved===false;
  return `<div class="task-card${task.status==='done'?' done-c':''}" onclick="openModal('viewTask','${task.id}')">
    <div class="tc-hdr">
      <div class="prio-dot" style="background:${pColor(task.priority)}"></div>
      <div class="tc-title${task.status==='done'?' sk':''}">${task.title}</div>
      <div onclick="event.stopPropagation()" style="display:flex;gap:4px">
        ${pendingApproval&&isOwner?`
          <button class="btn btn-sm" style="background:var(--grng);color:var(--grn);border:1px solid var(--grn)" onclick="approveTask('${task.id}')" title="Approve"><i class="ti ti-check" style="font-size:11px"></i></button>
          <button class="btn btn-sm" style="background:var(--redg);color:var(--red);border:1px solid var(--red)" onclick="rejectTask('${task.id}')" title="Send back"><i class="ti ti-x" style="font-size:11px"></i></button>
        `:`
        ${canEditTask(team,task)?`<button class="btn btn-g btn-sm" onclick="quickStatus('${task.id}')" title="Cycle status"><i class="ti ti-refresh" style="font-size:11px"></i></button>`:''}
        ${canEditTask(team,task)?`<button class="btn btn-g btn-sm" onclick="openModal('editTask','${task.id}')"><i class="ti ti-edit" style="font-size:11px"></i></button>`:''}
        `}
      </div>
    </div>
    ${pendingApproval?`<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;font-size:11px;font-weight:600;color:var(--amb)"><i class="ti ti-clock" style="font-size:12px"></i> Pending approval</div>`:''}
    ${labels.length?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px">${labels.map(l=>`<span class="lbl" style="background:${l.color}20;color:${l.color}">${l.name}</span>`).join('')}</div>`:''}
    ${task.description?`<p style="font-size:12px;color:var(--text2);margin-bottom:7px;line-height:1.5">${task.description.slice(0,90)}${task.description.length>90?'…':''}</p>`:''}

      <span class="badge b-${task.status}">${STATUS_MAP[task.status]||task.status}</span>
      ${task.deadline?`<span class="dl ${dlCls(task.deadline)}"><i class="ti ti-calendar" style="font-size:10px"></i>${dlLbl(task.deadline)}</span>`:''}
      ${task.skills?`<span class="badge" style="background:var(--accg);color:var(--acc)">${task.skills}</span>`:''}
      ${cc?`<span class="cc"><i class="ti ti-message-2" style="font-size:11px"></i>${cc}</span>`:''}
      <div class="av-stack">${assignees.map(m=>`<div class="av av-xs" title="${m.display}" style="background:${ac(m.display)}22;color:${ac(m.display)}">${ini(m.display)}</div>`).join('')}</div>
    </div>
    ${task.progress?`<div class="prog-bar"><div class="prog-fill" style="width:${task.progress}%"></div></div>`:''}
  </div>`;

// ── Performance Dashboard (owner/admin) ─────────────────────────
function healthColor(h){
  if(h>=80)return'var(--grn)';
  if(h>=60)return'var(--blu)';
  if(h>=40)return'var(--amb)';
  return'var(--red)';
}
function trendIcon(t){
  if(t==='improving')return'<span style="color:var(--grn)">📈</span>';
  if(t==='declining')return'<span style="color:var(--red)">📉</span>';
  return'<span style="color:var(--text3)">➡️</span>';
}

function renderPerformance(){
  const team=getTeam();if(!team)return`<div class="empty"><i class="ti ti-chart-dots"></i>Select a team</div>`;
  const myRole=getMyRole(team);
  if(myRole!=='owner'&&myRole!=='admin'){
    return `<div class="empty"><i class="ti ti-lock"></i>Only Owner and Admins can view team performance</div>`;
  }

  let members=(team.members||[]).map(mid=>{
    const m=DB.users[mid];if(!m)return null;
    return{...m,perf:analyzeMember(mid,team)};
  }).filter(Boolean);

  // search
  if(UI.perfSearch){
    const q=UI.perfSearch.toLowerCase();
    members=members.filter(m=>m.display.toLowerCase().includes(q)||m.username.toLowerCase().includes(q));
  }

  // sort
  const sortFns={
    health:(a,b)=>b.perf.health-a.perf.health,
    completion:(a,b)=>b.perf.completionRate-a.perf.completionRate,
    tasks:(a,b)=>b.perf.total-a.perf.total,
    overdue:(a,b)=>b.perf.overdue-a.perf.overdue,
    name:(a,b)=>a.display.localeCompare(b.display),
  };
  members.sort(sortFns[UI.perfSort]||sortFns.health);

  // خلاصه کل تیم
  const allPerf=(team.members||[]).map(mid=>analyzeMember(mid,team));
  const avgHealth=allPerf.length?Math.round(allPerf.reduce((a,p)=>a+p.health,0)/allPerf.length):0;
  const totalOverdue=allPerf.reduce((a,p)=>a+p.overdue,0);
  const atRisk=allPerf.filter(p=>p.health<40).length;
  const topPerformers=allPerf.filter(p=>p.health>=80).length;

  return `<div class="page-hdr"><div class="page-title"><i class="ti ti-chart-dots" style="margin-right:5px"></i>Team Performance</div></div>

  <div class="stats-grid">
    <div class="stat"><div class="stat-lbl">Team performance</div><div class="stat-val" style="color:${healthColor(avgHealth)}">${avgHealth}</div></div>
    <div class="stat"><div class="stat-lbl">Top performers</div><div class="stat-val" style="color:var(--grn)">${topPerformers}</div></div>
    <div class="stat"><div class="stat-lbl">At risk</div><div class="stat-val" style="color:${atRisk?'var(--red)':'var(--grn)'}">${atRisk}</div></div>
    <div class="stat"><div class="stat-lbl">Total overdue</div><div class="stat-val" style="color:${totalOverdue?'var(--red)':'var(--grn)'}">${totalOverdue}</div></div>
  </div>

  <div class="toolbar">
    <div class="search-box"><i class="ti ti-search"></i><input placeholder="Search members…" value="${UI.perfSearch}" oninput="doPerfSearch(this.value)"/></div>
    <select class="flt" onchange="setPerfSort(this.value)">
      <option value="health"${UI.perfSort==='health'?' selected':''}>Sort: Performance</option>
      <option value="completion"${UI.perfSort==='completion'?' selected':''}>Sort: Completion %</option>
      <option value="tasks"${UI.perfSort==='tasks'?' selected':''}>Sort: Task count</option>
      <option value="overdue"${UI.perfSort==='overdue'?' selected':''}>Sort: Overdue</option>
      <option value="name"${UI.perfSort==='name'?' selected':''}>Sort: Name</option>
    </select>
  </div>

  <div style="font-size:11px;color:var(--text3);margin-bottom:10px">${members.length} member${members.length!==1?'s':''}</div>

  <div id="PERF_LIST" style="display:flex;flex-direction:column;gap:9px">
    ${members.length===0?`<div class="empty"><i class="ti ti-user-search"></i>No members found</div>`:members.map(m=>renderPerfCard(m,team)).join('')}
  </div>`;
}

function doPerfSearch(q){
  UI.perfSearch=q;
  const team=getTeam();if(!team)return;
  let members=(team.members||[]).map(mid=>{const m=DB.users[mid];if(!m)return null;return{...m,perf:analyzeMember(mid,team)};}).filter(Boolean);
  if(q){const lq=q.toLowerCase();members=members.filter(m=>m.display.toLowerCase().includes(lq)||m.username.toLowerCase().includes(lq));}
  const sortFns={health:(a,b)=>b.perf.health-a.perf.health,completion:(a,b)=>b.perf.completionRate-a.perf.completionRate,tasks:(a,b)=>b.perf.total-a.perf.total,overdue:(a,b)=>b.perf.overdue-a.perf.overdue,name:(a,b)=>a.display.localeCompare(b.display)};
  members.sort(sortFns[UI.perfSort]||sortFns.health);
  const list=document.getElementById('PERF_LIST');
  if(list)list.innerHTML=members.length===0?`<div class="empty"><i class="ti ti-user-search"></i>No members found</div>`:members.map(m=>renderPerfCard(m,team)).join('');
}
function setPerfSort(s){UI.perfSort=s;renderApp();}

// ── Team Chat ────────────────────────────────────────────────────
let _chatPollTimer=null;

function fmtChatTime(ts){
  const d=new Date(ts);
  return d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
}
function chatDayLabel(ts){
  const d=new Date(ts),today=new Date();
  const isSameDay=d.toDateString()===today.toDateString();
  const yest=new Date(today);yest.setDate(yest.getDate()-1);
  if(isSameDay)return'Today';
  if(d.toDateString()===yest.toDateString())return'Yesterday';
  return d.toLocaleDateString('en',{month:'short',day:'numeric'});
}

  const team=getTeam();if(!team)return`<div class="empty"><i class="ti ti-message-circle"></i>Select a team</div>`;
  const chat=DB.chats[team.id]||{messages:[]};

  let lastDay=null;
  const msgsHtml=msgs.map(m=>{
    const isOwn=m.authorId===SESSION.userId;
    const author=DB.users[m.authorId];
    const dayLbl=chatDayLabel(m.ts);
    let daySep='';
    if(dayLbl!==lastDay){daySep=`<div class="chat-day-sep">${dayLbl}</div>`;lastDay=dayLbl;}
    return `${daySep}<div class="chat-row${isOwn?' own':''}">
      ${!isOwn?`<div class="av av-sm" style="background:${ac(m.author)}22;color:${ac(m.author)};flex-shrink:0">${ini(m.author)}</div>`:''}
      <div>
        <div class="chat-meta"><span class="chat-name">${isOwn?'You':m.author}</span><span class="chat-time">${fmtChatTime(m.ts)}</span></div>
        <div class="chat-bubble">${highlightMentions(m.text,team)}</div>
      </div>
    </div>`;
  }).join('');

  const memberCount=(team.members||[]).length;
  return `<div class="page-hdr">

function scrollChatToBottom(){
  const el=document.getElementById('CHAT_MSGS');
  if(el)el.scrollTop=el.scrollHeight;
}

async function sendChatMessage(){
  const input=document.getElementById('CHAT_TEXT');
  if(!input)return;
  const text=input.value.trim();if(!text)return;
  const team=getTeam();if(!team)return;
  const author=me().display;

  if(!DB.chats[team.id])DB.chats[team.id]={messages:[]};
  const msg={id:uid(),authorId:SESSION.userId,author,text,ts:Date.now()};
  DB.chats[team.id].messages.push(msg);
  if(DB.chats[team.id].messages.length>300) DB.chats[team.id].messages=DB.chats[team.id].messages.slice(-300);

  input.value='';
  const dd=document.getElementById('CHAT_MENTION_DD');if(dd)dd.style.display='none';

  // فقط لیست پیام‌ها رو دوباره رندر کن، نه کل صفحه — تا اسکرول و فوکوس حفظ بشه
  const msgsEl=document.getElementById('CHAT_MSGS');
  if(msgsEl){
    let lastDay=null;
    msgsEl.innerHTML=DB.chats[team.id].messages.map(m=>{
      const isOwn=m.authorId===SESSION.userId;
      const dayLbl=chatDayLabel(m.ts);
      let daySep='';
      if(dayLbl!==lastDay){daySep=`<div class="chat-day-sep">${dayLbl}</div>`;lastDay=dayLbl;}
      return `${daySep}<div class="chat-row${isOwn?' own':''}">
        ${!isOwn?`<div class="av av-sm" style="background:${ac(m.author)}22;color:${ac(m.author)};flex-shrink:0">${ini(m.author)}</div>`:''}
        <div>
          <div class="chat-meta"><span class="chat-name">${isOwn?'You':m.author}</span><span class="chat-time">${fmtChatTime(m.ts)}</span></div>
          <div class="chat-bubble">${highlightMentions(m.text,team)}</div>
        </div>
      </div>`;
    }).join('');
    scrollChatToBottom();
  }

  // منشن‌ها رو نوتیف کن
  const mentioned=extractMentions(text,team);
  mentioned.forEach(u=>{
    if(u.id===SESSION.userId)return;
    addNotif(u.id,`<strong>${author}</strong> mentioned you in team chat`);
    if(u.telegramId){
      tgSend(u.telegramId,`💬 <b>TeamFlow</b>\n${author} mentioned you in team chat!\n\nTeam: ${team.name}\n\n"${text}"`);
    }
  });
  if(mentioned.length){
    // notif روی DB.users[uid] هست، نه روی خود من — پس هرکدوم جدا save میشه
    await Promise.all(mentioned.filter(u=>u.id!==SESSION.userId).map(u=>svUser(u.id)));
  }

  await svChat(team.id);
}

function onChatInput(){
  const input=document.getElementById('CHAT_TEXT');
  const dd=document.getElementById('CHAT_MENTION_DD');
  if(!input||!dd)return;
  const team=getTeam();if(!team)return;
  const query=getMentionQuery(input);
  if(query===null){dd.style.display='none';return;}
  const matches=(team.members||[]).map(mid=>DB.users[mid]).filter(u=>u&&u.id!==SESSION.userId&&u.username.toLowerCase().startsWith(query.toLowerCase()));
  if(matches.length===0){dd.style.display='none';return;}
  _mentionActiveIdx=0;
  dd.style.display='block';
  dd.innerHTML=matches.map((u,i)=>`
    <div class="mention-item${i===0?' hi':''}" data-idx="${i}" data-username="${u.username}" onclick="selectChatMention('${u.username}')">
      <div class="av av-xs" style="background:${ac(u.display)}22;color:${ac(u.display)}">${ini(u.display)}</div>
      <span>${u.display}</span><span style="color:var(--text3)">@${u.username}</span>
    </div>`).join('');
}

function onChatKeydown(event){
  const dd=document.getElementById('CHAT_MENTION_DD');
  const isOpen=dd&&dd.style.display==='block';
  if(isOpen){
    const items=dd.querySelectorAll('.mention-item');
    if(event.key==='ArrowDown'){event.preventDefault();_mentionActiveIdx=Math.min(_mentionActiveIdx+1,items.length-1);updateMentionHighlight(items);return;}
    if(event.key==='ArrowUp'){event.preventDefault();_mentionActiveIdx=Math.max(_mentionActiveIdx-1,0);updateMentionHighlight(items);return;}
    if(event.key==='Enter'||event.key==='Tab'){
      event.preventDefault();
      const active=items[_mentionActiveIdx];
      if(active)selectChatMention(active.dataset.username);
      return;
    }
    if(event.key==='Escape'){dd.style.display='none';return;}
  }
  if(event.key==='Enter'&&!isOpen){sendChatMessage();}
}

function selectChatMention(username){
  const input=document.getElementById('CHAT_TEXT');
  const dd=document.getElementById('CHAT_MENTION_DD');
  if(!input)return;
  const pos=input.selectionStart;
  const text=input.value;
  const before=text.slice(0,pos).replace(/@([a-zA-Z0-9_]*)$/,'@'+username+' ');
  const after=text.slice(pos);
  input.value=before+after;
  const newPos=before.length;
  input.focus();
  input.setSelectionRange(newPos,newPos);
  if(dd)dd.style.display='none';
}

function startChatPolling(){
  stopChatPolling();
  _chatPollTimer=setInterval(async()=>{
    if(UI.page!=='chat'||!UI.activeTeam)return;
    const fresh=await loadChat(UI.activeTeam);
    if(!fresh)return;
    const old=DB.chats[UI.activeTeam]||{messages:[]};
    if((fresh.messages||[]).length===(old.messages||[]).length)return; // چیز جدیدی نیومده
    DB.chats[UI.activeTeam]=fresh;
    const msgsEl=document.getElementById('CHAT_MSGS');
    if(!msgsEl)return;
    const wasAtBottom=msgsEl.scrollHeight-msgsEl.scrollTop-msgsEl.clientHeight<60;
    const team=getTeam();if(!team)return;
    let lastDay=null;
    msgsEl.innerHTML=(fresh.messages||[]).map(m=>{
      const isOwn=m.authorId===SESSION.userId;
      const dayLbl=chatDayLabel(m.ts);
      let daySep='';
      if(dayLbl!==lastDay){daySep=`<div class="chat-day-sep">${dayLbl}</div>`;lastDay=dayLbl;}
      return `${daySep}<div class="chat-row${isOwn?' own':''}">
        ${!isOwn?`<div class="av av-sm" style="background:${ac(m.author)}22;color:${ac(m.author)};flex-shrink:0">${ini(m.author)}</div>`:''}
        <div>
          <div class="chat-meta"><span class="chat-name">${isOwn?'You':m.author}</span><span class="chat-time">${fmtChatTime(m.ts)}</span></div>
          <div class="chat-bubble">${highlightMentions(m.text,team)}</div>
        </div>
      </div>`;
    }).join('');
    if(wasAtBottom)scrollChatToBottom();
  },5000);
}
function stopChatPolling(){
  if(_chatPollTimer){clearInterval(_chatPollTimer);_chatPollTimer=null;}
}

function renderAnalytics(){
  const team=getTeam();if(!team)return`<div class="empty"><i class="ti ti-chart-bar"></i>Select a team</div>`;
  const tasks=team.tasks||[];
  const statuses=['todo','inprogress','review','done','blocked'];
  const sCounts=statuses.map(s=>tasks.filter(t=>t.status===s).length);
  const maxS=Math.max(...sCounts,1);
  const sColors=['var(--text2)','var(--blu)','var(--amb)','var(--grn)','var(--red)'];
  const members=(team.members||[]).map(mid=>DB.users[mid]).filter(Boolean);
  const mWork=members.map(m=>({name:m.display,count:tasks.filter(t=>(t.assignees||[]).includes(m.id)).length})).sort((a,b)=>b.count-a.count).slice(0,5);
  const maxM=Math.max(...mWork.map(m=>m.count),1);
  const total=tasks.length,done=tasks.filter(t=>t.status==='done').length;
  const pH=tasks.filter(t=>t.priority==='high').length,pM=tasks.filter(t=>t.priority==='medium').length,pL=tasks.filter(t=>t.priority==='low').length;
  const overdue=tasks.filter(t=>t.status!=='done'&&t.deadline&&days(t.deadline)<0).length;
  return `<div class="page-hdr"><div class="page-title">Analytics</div></div>
  <div class="stats-grid">
    <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val" style="color:var(--acc)">${total}</div></div>
    <div class="stat"><div class="stat-lbl">Done</div><div class="stat-val" style="color:var(--grn)">${total?Math.round(done/total*100):0}%</div></div>
    <div class="stat"><div class="stat-lbl">Members</div><div class="stat-val" style="color:var(--blu)">${members.length}</div></div>
    <div class="stat"><div class="stat-lbl">Overdue</div><div class="stat-val" style="color:${overdue?'var(--red)':'var(--grn)'}">${overdue}</div></div>
  </div>
  <div class="an-grid">
    <div class="cc-card"><div class="cc-title">Tasks by status</div><div class="bar-ch">${statuses.map((s,i)=>`<div class="bw"><div class="bv">${sCounts[i]}</div><div class="bar" style="height:${Math.round(sCounts[i]/maxS*70)+4}px;background:${sColors[i]};opacity:.85"></div><div class="bl">${STATUS_MAP[s]?.split(' ')[0]}</div></div>`).join('')}</div></div>
    <div class="cc-card"><div class="cc-title">Priority split</div><div class="donut-wrap"><svg width="80" height="80" viewBox="0 0 80 80">${donut([pH,pM,pL],['var(--red)','var(--amb)','var(--grn)'])}</svg><div class="legend"><div class="li"><div class="ld" style="background:var(--red)"></div>High (${pH})</div><div class="li"><div class="ld" style="background:var(--amb)"></div>Med (${pM})</div><div class="li"><div class="ld" style="background:var(--grn)"></div>Low (${pL})</div></div></div></div>
    <div class="cc-card"><div class="cc-title">Workload per member</div>${mWork.length===0?`<div style="font-size:12px;color:var(--text3)">No data</div>`:`<div style="display:flex;flex-direction:column;gap:7px">${mWork.map(m=>`<div><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span>${m.name.split(' ')[0]}</span><span style="color:var(--text2)">${m.count}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${Math.round(m.count/maxM*100)}%"></div></div></div>`).join('')}</div>`}</div>
    <div class="cc-card"><div class="cc-title">Deadline timeline</div>${tasks.filter(t=>t.status!=='done'&&t.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,6).map(t=>`<div class="tl-row"><span class="dl ${dlCls(t.deadline)}" style="width:60px;font-size:10px">${dlLbl(t.deadline)}</span><span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</span></div>`).join('')||`<div style="font-size:12px;color:var(--text3)">None</div>`}</div>
  </div>`;
}

function donut(vals,colors){
  const total=vals.reduce((a,b)=>a+b,0);if(!total)return`<circle cx="40" cy="40" r="30" fill="none" stroke="var(--bg4)" stroke-width="12"/>`;
  let angle=-Math.PI/2,svg='';
  vals.forEach((v,i)=>{const s=(v/total)*2*Math.PI;const x1=40+30*Math.cos(angle),y1=40+30*Math.sin(angle);const x2=40+30*Math.cos(angle+s),y2=40+30*Math.sin(angle+s);const lg=s>Math.PI?1:0;if(v>0)svg+=`<path d="M40,40 L${x1.toFixed(1)},${y1.toFixed(1)} A30,30 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${colors[i]}" opacity=".85"/>`;angle+=s;});
  svg+=`<circle cx="40" cy="40" r="18" fill="var(--bg2)"/>`;
  const top=vals[0];svg+=`<text x="40" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">${total?Math.round(top/total*100):0}%</text>`;
  return svg;
}

function pickColor(el,c){document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));el.classList.add('on');tmpColor=c}
function toggleSkill(el,s){const i=tmpSkills.indexOf(s);if(i===-1){tmpSkills.push(s);el.classList.add('on')}else{tmpSkills.splice(i,1);el.classList.remove('on')}}

function toggleAss(mid){const el=document.getElementById('AC_'+mid);const i=tmpAssignees.indexOf(mid);if(i===-1){tmpAssignees.push(mid);el?.classList.add('on')}else{tmpAssignees.splice(i,1);el?.classList.remove('on')}}

function showAssigneeSuggestions(){
  const team=getTeam();if(!team)return;

  const skill=document.getElementById('M_SKILL')?.value||'';
  const suggestions=suggestAssignees(skill,team).slice(0,3);
  if(suggestions.length===0){box.style.display='block';box.innerHTML=`<div style="font-size:12px;color:var(--text3);padding:8px">No members to suggest.</div>`;return;}
  const medals=['🥇','🥈','🥉'];
  box.style.display='block';
  box.innerHTML=`
    <div style="background:var(--accg);border:1px solid var(--acc);border-radius:var(--r);padding:10px">
      <div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:8px;display:flex;align-items:center;gap:5px"><i class="ti ti-sparkles"></i> SMART SUGGESTIONS${skill?` for ${skill}`:''}</div>
      ${suggestions.map((s,i)=>`
        <div style="display:flex;align-items:center;gap:9px;padding:7px;border-radius:var(--r);cursor:pointer;background:${tmpAssignees.includes(s.member.id)?'var(--bg2)':'transparent'};margin-bottom:${i<suggestions.length-1?'4px':'0'}" onclick="pickSuggested('${s.member.id}')">
          <span style="font-size:15px">${medals[i]}</span>
          <div class="av av-xs" style="background:${ac(s.member.display)}22;color:${ac(s.member.display)}">${ini(s.member.display)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600">${s.member.display}</div>
            <div style="font-size:10px;color:var(--text2)">${s.reasons.slice(0,3).join(' · ')||'available'}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:700;color:var(--acc)">${s.score}</div>
            <div style="font-size:9px;color:var(--text3)">match</div>
          </div>
          ${tmpAssignees.includes(s.member.id)?`<i class="ti ti-check" style="color:var(--grn);font-size:14px"></i>`:`<i class="ti ti-plus" style="color:var(--text3);font-size:14px"></i>`}
        </div>`).join('')}
    </div>`;

function pickSuggested(mid){
  toggleAss(mid);
  showAssigneeSuggestions(); // رفرش برای نشون دادن تیک
}

function suggestTaskDeadline(){
  const team=getTeam();if(!team)return;
  const hint=document.getElementById('DL_HINT');
  const skill=document.getElementById('M_SKILL')?.value||'';
  const s=suggestDeadline(skill,team);
  const d=new Date();d.setDate(d.getDate()+s.days);
  const iso=d.toISOString().split('T')[0];
  const dlInput=document.getElementById('M_DL');
  if(dlInput)dlInput.value=iso;
  if(hint){
    hint.style.color='var(--acc)';
    hint.innerHTML=`✨ Suggested <b>${s.days} days</b> from now${skill&&s.hasSkill?` — based on ${s.poolSize} ${skill} member${s.poolSize!==1?'s':''}`:''} (avg workload: ${s.avgLoad} tasks/person, team avg completion: ${s.avgCompletionDays}d)`;
  }
}

// This prevented race conditions where loadDB() would reset pending state
async function createTeam(){
  const name=document.getElementById('M_NAME').value.trim();if(!name)return;
  const desc=document.getElementById('M_DESC').value.trim();
  const t={id:uid(),name,color:tmpColor,desc,ownerId:SESSION.userId,members:[SESSION.userId],removedMembers:[],roles:{},tasks:[],activity:[]};
  DB.teams[t.id]=t;UI.activeTeam=t.id;UI.page='tasks';

async function sendInvite(){
  const username=document.getElementById('M_INV_USER').value.trim().toLowerCase();
  const team=getTeam();if(!team)return;
  const msg=document.getElementById('INV_MSG');
  if(!canInvite(team)){msg.style.color='var(--red)';msg.textContent='Only Owner or Admin can invite members';return}
  const target=Object.values(DB.users).find(u=>u.username===username);
  if(!target){msg.style.color='var(--red)';msg.textContent='User @'+username+' not found';return}
  if(target.id===SESSION.userId){msg.style.color='var(--red)';msg.textContent='You cannot invite yourself';return}
  if(team.members.includes(target.id)){msg.style.color='var(--red)';msg.textContent='@'+username+' is already in this team';return}
  if(DB.invites.find(i=>i.teamId===team.id&&i.toUserId===target.id&&i.status==='pending')){msg.style.color='var(--red)';msg.textContent='Already sent an invite to @'+username;return}
  // انتخاب role برای invite
  const selectedRole=document.getElementById('M_INV_ROLE')?.value||'member';
  DB.invites.push({id:uid(),teamId:team.id,fromUserId:SESSION.userId,toUserId:target.id,status:'pending',role:selectedRole,ts:Date.now()});
  addNotif(target.id,`@${me().username} invited you to join team <strong>${team.name}</strong>`);
  addAct(team.id,'ti-mail','var(--accg)',`Invite sent to <strong>@${target.username}</strong> as ${selectedRole}`);
  msg.style.color='var(--grn)';msg.textContent='Invite sent to @'+username+'!';
  await Promise.all([svTeam(team.id), svMeta(), sv('user:'+target.id)]);
  setTimeout(()=>{closeModal();renderApp()},800);
}

// FIX: respondInvite no longer calls loadDB() — works on current state
async function respondInvite(invId,accept){
  const inv=DB.invites.find(i=>i.id===invId);
  if(!inv||inv.toUserId!==SESSION.userId)return;
  inv.status=accept?'accepted':'declined';
  if(accept){
    const team=DB.teams[inv.teamId];
    if(team){
      if(!Array.isArray(team.members))team.members=[];
      if(Array.isArray(team.removedMembers))team.removedMembers=team.removedMembers.filter(id=>id!==inv.toUserId);
      const wasMember=team.members.includes(inv.toUserId);
      [team.ownerId,inv.fromUserId,inv.toUserId].filter(Boolean).forEach(uid=>{
        if(!team.members.includes(uid))team.members.push(uid);
      });
      // role رو از invite بگیر، default: member
      if(!team.roles)team.roles={};
      if(inv.toUserId!==team.ownerId) team.roles[inv.toUserId]=inv.role||'member';
      if(!wasMember){
        addAct(inv.teamId,'ti-user-check','var(--grng)',`<strong>${me().display}</strong> joined the team`);
        addNotif(inv.fromUserId,`<strong>${me().display}</strong> accepted your invite to <strong>${team.name}</strong>!`);
      }
      UI.activeTeam=inv.teamId;UI.page='tasks';
    }
  } else {
    addNotif(inv.fromUserId,`@${me().username} declined the invite to <strong>${DB.teams[inv.teamId]?.name}</strong>`);
  }
  const jobs=[svMeta()];
  if(accept && DB.teams[inv.teamId]) jobs.push(svTeam(inv.teamId));
  jobs.push(svUser());
  await Promise.all(jobs);
  renderApp();
}

async function saveRole(mid){
  const team=getTeam();if(!team||team.ownerId!==SESSION.userId)return;
  const newRole=document.getElementById('M_ROLE_SEL').value;
  if(!team.roles)team.roles={};
  team.roles[mid]=newRole;
  const m=DB.users[mid];
  addAct(team.id,'ti-shield','var(--accg)',`<strong>${m?.display}</strong> role changed to <strong>${newRole}</strong>`);
  if(m?.telegramId) tgSend(m.telegramId,`🛡️ <b>TeamFlow</b>\nYour role in <b>${team.name}</b> changed to <b>${ROLES[newRole].icon} ${ROLES[newRole].label}</b>`);
  await svTeam(team.id);closeModal();renderApp();
}

async function kickMember(mid){
  const team=getTeam();if(!team||!canKick(team))return;
  const m=DB.users[mid];if(!confirm(`Remove ${m?.display} from the team?`))return;
  if(!team.removedMembers)team.removedMembers=[];
  if(!team.removedMembers.includes(mid))team.removedMembers.push(mid);
  team.members=team.members.filter(x=>x!==mid);
  (team.tasks||[]).forEach(t=>{if(t.assignees)t.assignees=t.assignees.filter(a=>a!==mid)});
  addAct(team.id,'ti-user-minus','var(--redg)',`<strong>${m?.display||'Member'}</strong> was removed from the team`);
  if(mid!==SESSION.userId)addNotif(mid,`You were removed from team <strong>${team.name}</strong>`);
  await Promise.all([svTeam(team.id), sv('user:'+mid)]);
  renderApp();
}
