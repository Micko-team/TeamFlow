// ── @Mention System ────────────────────────────────────────────
let _mentionActiveIdx=0;

function highlightMentions(text,team){
  if(!text)return'';
  // اسکیپ HTML خطرناک ساده
  const esc=text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(/@([a-zA-Z0-9_]+)/g,(match,uname)=>{
    const found=(team.members||[]).map(mid=>DB.users[mid]).find(u=>u&&u.username===uname);
    return found?`<span class="mention-tag">@${uname}</span>`:match;
  });
}

function extractMentions(text,team){
  const usernames=[...text.matchAll(/@([a-zA-Z0-9_]+)/g)].map(m=>m[1]);
  const uniqueNames=[...new Set(usernames)];
  return uniqueNames.map(uname=>(team.members||[]).map(mid=>DB.users[mid]).find(u=>u&&u.username===uname)).filter(Boolean);
}

function getMentionQuery(input){
  const pos=input.selectionStart;
  const text=input.value.slice(0,pos);
  const match=text.match(/@([a-zA-Z0-9_]*)$/);
  return match?match[1]:null;
}

function onCommentInput(taskId){
  const input=document.getElementById('C_TEXT');
  const dd=document.getElementById('MENTION_DD');
  if(!input||!dd)return;
  const team=getTeam();if(!team)return;
  const query=getMentionQuery(input);
  if(query===null){dd.style.display='none';return;}
  const matches=(team.members||[]).map(mid=>DB.users[mid]).filter(u=>u&&u.id!==SESSION.userId&&u.username.toLowerCase().startsWith(query.toLowerCase()));
  if(matches.length===0){dd.style.display='none';return;}
  _mentionActiveIdx=0;
  dd.style.display='block';
  dd.innerHTML=matches.map((u,i)=>`
    <div class="mention-item${i===0?' hi':''}" data-idx="${i}" data-username="${u.username}" onclick="selectMention('${u.username}')">
      <div class="av av-xs" style="background:${ac(u.display)}22;color:${ac(u.display)}">${ini(u.display)}</div>
      <span>${u.display}</span><span style="color:var(--text3)">@${u.username}</span>
    </div>`).join('');
}

function onCommentKeydown(event,taskId){
  const dd=document.getElementById('MENTION_DD');
  const isOpen=dd&&dd.style.display==='block';
  if(isOpen){
    const items=dd.querySelectorAll('.mention-item');
    if(event.key==='ArrowDown'){event.preventDefault();_mentionActiveIdx=Math.min(_mentionActiveIdx+1,items.length-1);updateMentionHighlight(items);return;}
    if(event.key==='ArrowUp'){event.preventDefault();_mentionActiveIdx=Math.max(_mentionActiveIdx-1,0);updateMentionHighlight(items);return;}
    if(event.key==='Enter'||event.key==='Tab'){
      event.preventDefault();
      const active=items[_mentionActiveIdx];
      if(active)selectMention(active.dataset.username);
      return;
    }
    if(event.key==='Escape'){dd.style.display='none';return;}
  }
  if(event.key==='Enter'&&!isOpen){addComment(taskId);}
}

function updateMentionHighlight(items){
  items.forEach((el,i)=>el.classList.toggle('hi',i===_mentionActiveIdx));
}

function selectMention(username){
  const input=document.getElementById('C_TEXT');
  const dd=document.getElementById('MENTION_DD');
  if(!input)return;
  const pos=input.selectionStart;
  const text=input.value;
  const before=text.slice(0,pos).replace(/@([a-zA-Z0-9_]*)$/,'@'+username+' ');
  const after=text.slice(pos);
  input.value=before+after;
  const newPos=before.length;
  input.focus();
  input.setSelectionRange(newPos,newPos);
  if(dd)dd.style.display='none';
}


async function addComment(taskId){
  const text=document.getElementById('C_TEXT').value.trim();if(!text)return;
  const team=getTeam();if(!team)return;
  const task=team.tasks.find(t=>t.id===taskId);if(!task)return;
  const author=me().display;
  if(!task.comments)task.comments=[];
  task.comments.push({id:uid(),author,authorId:SESSION.userId,text,ts:Date.now()});
  addAct(team.id,'ti-message-2','var(--accg)',`<strong>${author}</strong> commented on <strong>"${task.title}"</strong>`);
  // notif معمولی برای assignee ها
  (task.assignees||[]).filter(mid=>mid!==SESSION.userId).forEach(mid=>{addNotif(mid,`${author} commented on "${task.title}"`)});
  // notif مخصوص برای کسانی که با @ منشن شدن
  const mentioned=extractMentions(text,team);
  mentioned.forEach(u=>{
    if(u.id===SESSION.userId)return;
    addNotif(u.id,`<strong>${author}</strong> mentioned you in a comment on <strong>"${task.title}"</strong>`);
    if(u.telegramId){
      tgSend(u.telegramId,`💬 <b>TeamFlow</b>\n${author} mentioned you in a comment!\n\n📋 <b>${task.title}</b>\nTeam: ${team.name}\n\n"${text}"`);
    }
  });
  await svTeam(team.id);closeModal();openModal('viewTask',taskId);
}

// FIX: quickStatus no longer calls loadDB()
async function quickStatus(id){
  const team=getTeam();if(!team)return;
  const task=team.tasks.find(t=>t.id===id);if(!task)return;
  const cycle=['todo','inprogress','review','done','blocked'];
  const i=cycle.indexOf(task.status);task.status=cycle[(i+1)%cycle.length];
  addAct(team.id,'ti-arrows-exchange','var(--blug)',`<strong>"${task.title}"</strong> → ${STATUS_MAP[task.status]}`);
  if(task.status==='done'){
    task.completedAt=Date.now();
    task.completedBy=SESSION.userId;
    // اگه owner خودش تسک رو done کرد، خودکار تایید میشه. در غیر این صورت منتظر تایید owner می‌مونه
    if(SESSION.userId===team.ownerId){
      task.approved=true;
    }else{
      task.approved=false;
      // به owner اطلاع بده که یه تسک منتظر تاییده
      if(team.ownerId!==SESSION.userId){
        addNotif(team.ownerId,`<strong>${me().display}</strong> completed <strong>"${task.title}"</strong> — needs your approval`);
        const owner=DB.users[team.ownerId];
        if(owner?.telegramId) tgSend(owner.telegramId,`✅ <b>TeamFlow</b>\n${me().display} completed a task and needs your approval!\n\n📋 <b>${task.title}</b>\nTeam: ${team.name}`);
      }
    }
    (task.assignees||[]).filter(m=>m!==SESSION.userId).forEach(mid=>addNotif(mid,`"${task.title}" was completed`));
  }
  await svTeam(team.id);renderApp();
}

// فقط owner می‌تونه تسک رو تایید کنه تا امتیازش ثبت بشه
async function approveTask(taskId){
  const team=getTeam();if(!team||team.ownerId!==SESSION.userId)return;

// owner می‌تونه رد کنه و برگردونه به review برای اصلاح
async function rejectTask(taskId){

async function saveProfile(){
  const u=me();if(!u)return;
  const msg=document.getElementById('PROFILE_MSG');
  const newEmail=document.getElementById('M_EMAIL').value.trim().toLowerCase();
  const oldEmail=(u.email||'').toLowerCase();

  if(newEmail&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)){
    if(msg){msg.style.color='var(--red)';msg.textContent='Please enter a valid email address';}
    return;
  }
  // چک کن ایمیل تکراری نباشه (برای یوزر دیگه)
  if(newEmail&&Object.values(DB.users).find(x=>x.id!==u.id&&(x.email||'').toLowerCase()===newEmail)){
    if(msg){msg.style.color='var(--red)';msg.textContent='This email is already used by another account';}
    return;
  }

  u.display=document.getElementById('M_DISPLAY').value.trim()||u.display;
  u.role=document.getElementById('M_ROLE').value.trim();
  u.telegramId=document.getElementById('M_TG').value.trim()||null;
  u.skills=[...tmpSkills];

  const emailChanged=newEmail!==oldEmail;
  if(emailChanged){
    u.email=newEmail||null;
    if(newEmail){
      // ایمیل جدید/تغییریافته باید دوباره verify بشه
      u.verified=false;
      const sent=await sendVerificationEmail(u);
      await svUser();
      if(sent){
        closeModal();renderApp();
        // نمایش پیام بعد از رندر مجدد پروفایل
        setTimeout(()=>{
          const p=document.getElementById('CONTENT');
          if(p) p.insertAdjacentHTML('afterbegin',`<div style="background:var(--ambg);border:1px solid var(--amb);border-radius:var(--rl);padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--amb)"><i class="ti ti-mail"></i> Verification email sent to ${newEmail}. Please check your inbox to verify your new email.</div>`);
        },50);
      }else{
        closeModal();renderApp();
      }
      return;
    }else{
      u.verified=false;
    }
  }

  await svUser();closeModal();renderApp();
}

// FIX: leaveTeam no longer calls loadDB() before modifying state
// This was the main cause of "rejoin after leave" bug
async function leaveTeam(){
  const team=getTeam();if(!team)return;
  if(team.ownerId===SESSION.userId){
    const remaining=(team.members||[]).filter(m=>m!==SESSION.userId);
    if(remaining.length){
      if(!confirm('You are the owner. Transfer ownership and leave this team?'))return;
      team.ownerId=remaining[0];
      if(!team.removedMembers)team.removedMembers=[];
      if(!team.removedMembers.includes(SESSION.userId))team.removedMembers.push(SESSION.userId);
      team.members=remaining;
      (team.tasks||[]).forEach(t=>{if(t.assignees)t.assignees=t.assignees.filter(a=>a!==SESSION.userId)});
      addAct(team.id,'ti-door-exit','var(--redg)',`<strong>${me().display}</strong> left the team`);
      addNotif(team.ownerId,`You are now the owner of team <strong>${team.name}</strong>`);
    }else{
      if(!confirm('You are the only member. Delete this team?'))return;
      if(!DB.deletedTeams)DB.deletedTeams=[];
      if(!DB.deletedTeams.includes(team.id))DB.deletedTeams.push(team.id);
      delete DB.teams[team.id];
    }
  }else{
    if(!confirm('Leave this team?'))return;
    if(!team.removedMembers)team.removedMembers=[];
    if(!team.removedMembers.includes(SESSION.userId))team.removedMembers.push(SESSION.userId);
    team.members=(team.members||[]).filter(m=>m!==SESSION.userId);
    (team.tasks||[]).forEach(t=>{if(t.assignees)t.assignees=t.assignees.filter(a=>a!==SESSION.userId)});
    addAct(team.id,'ti-door-exit','var(--redg)',`<strong>${me().display}</strong> left the team`);
  }
  UI.activeTeam=myTeams()[0]?.id||null;
  // FIX: باید team row رو هم save کنیم چون members تغییر کرده
  const saveJobs=[svMeta(), svUser()];
  if(DB.teams[team.id]) saveJobs.push(svTeam(team.id));
  await Promise.all(saveJobs);
  renderApp();
}

async function boot(){
  // اگه لینک verify یا reset باشه، اول اونو پردازش کن
  if(checkAuthLinkParams()) return;

  let retries=3;
  while(retries-->0){
    try{
      await loadDB();
      if(SESSION.userId && !DB.users[SESSION.userId]) SESSION.userId=null;
      render();
      return;
    }catch(err){
      console.error('DB load error, retries left:',retries,err);
      if(retries>0){
        await new Promise(r=>setTimeout(r,2000)); // صبر 2 ثانیه و دوباره امتحان
      }
    }
  }
  // بعد از 3 بار تلاش، اگه کاربر لاگین بود همون حافظه رو نشون بده
  if(SESSION.userId){
    render();
    showSaveIndicator(false,'Offline mode');
  } else {
    document.getElementById('APP').innerHTML=`<div class="auth-screen"><div class="auth-card" style="text-align:center">
      <div class="auth-logo" style="margin-bottom:16px">Team<span>Flow</span></div>
      <div style="color:var(--red);font-size:13px">Could not connect to database.<br>Please check your internet connection and refresh.</div>
    </div></div>`;
  }
}
boot();
